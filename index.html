<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isekai Realms: Fantasy Chronicles</title>
    <!-- Tailwind CSS for mobile portrait layout -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            font-size: 16px; /* High legibility on mobile screens */
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 flex justify-center items-center min-h-screen p-4 select-none">

    <!-- Mobile Screen Frame Container -->
    <div class="w-full max-w-md bg-slate-900 border-2 border-slate-800 rounded-2xl shadow-2xl flex flex-col h-[90vh] overflow-hidden">
        
        <!-- Game Header / HUD -->
        <header class="bg-slate-950 px-6 py-4 border-b border-slate-800 flex justify-between items-center shrink-0">
            <h1 class="text-sm font-bold tracking-widest text-indigo-400 uppercase">Isekai Gateway</h1>
            <div id="hud-stats" class="text-xs text-slate-400 hidden">
                <span id="hud-name" class="font-semibold text-slate-200"></span> | 
                <span id="hud-chapter" class="text-amber-400 font-semibold">Ch 1/100</span>
            </div>
        </header>

        <!-- Dynamic Game Content Viewport -->
        <main id="game-viewport" class="flex-1 overflow-y-auto p-6 flex flex-col justify-between space-y-6">
            <!-- Content Injected Dynamically -->
        </main>
        
    </div>

    <script>
        // Pure Fantasy State Architecture
        let gameState = {
            subType: '',       // 'Summoner' | 'Ranger' | 'Assassin' | 'Knight'
            name: '',
            gender: '',        // 'Male' | 'Female' | 'Non-Binary'
            currentChapter: 1, // 100 Chapters
            romanceScore: 0,   // Hidden companion affinity counter
        };

        const view = document.getElementById('game-viewport');
        const hud = document.getElementById('hud-stats');

        function updateHUD() {
            if (gameState.name) {
                hud.classList.remove('hidden');
                document.getElementById('hud-name').innerText = `${gameState.name} (${gameState.subType})`;
                document.getElementById('hud-chapter').innerText = `Ch ${gameState.currentChapter}/100`;
            } else {
                hud.classList.add('hidden');
            }
        }

        // Phase 1: Pure Fantasy Class Selection Screen
        function initClassScreen() {
            updateHUD();
            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-center space-y-6">
                    <div class="text-center space-y-2">
                        <h2 class="text-2xl font-bold text-white">Select Your Class</h2>
                        <p class="text-slate-400 text-sm">Your physical awakening ruleset inside the magical plane.</p>
                    </div>
                    <div class="flex flex-col space-y-3">
                        <button onclick="selectClass('Summoner')" class="w-full py-4 px-6 bg-indigo-950 hover:bg-indigo-900 text-left font-semibold text-white rounded-xl transition-all border border-indigo-500/30 active:scale-95 flex justify-between items-center">
                            <span>🔮 Summoner</span> <span class="text-xs text-indigo-400">Ethereal Pets</span>
                        </button>
                        <button onclick="selectClass('Ranger')" class="w-full py-4 px-6 bg-emerald-950 hover:bg-emerald-900 text-left font-semibold text-white rounded-xl transition-all border border-emerald-500/30 active:scale-95 flex justify-between items-center">
                            <span>🏹 Ranger</span> <span class="text-xs text-emerald-400">Precision Strikes</span>
                        </button>
                        <button onclick="selectClass('Assassin')" class="w-full py-4 px-6 bg-rose-950 hover:bg-rose-900 text-left font-semibold text-white rounded-xl transition-all border border-rose-500/30 active:scale-95 flex justify-between items-center">
                            <span>🗡️ Assassin</span> <span class="text-xs text-rose-400">Shadow Stepping</span>
                        </button>
                        <button onclick="selectClass('Knight')" class="w-full py-4 px-6 bg-slate-800 hover:bg-slate-700 text-left font-semibold text-white rounded-xl transition-all border border-slate-600 active:scale-95 flex justify-between items-center">
                            <span>🛡️ Knight</span> <span class="text-xs text-slate-400">Heavy Bulwark</span>
                        </button>
                    </div>
                </div>
            `;
        }

        function selectClass(choice) {
            gameState.subType = choice;
            initCharacterCreation();
        }

        // Phase 2: Character Creation
        function initCharacterCreation() {
            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-center space-y-6">
                    <div class="text-center space-y-2">
                        <h2 class="text-xl font-bold text-white">Identity Awakening</h2>
                        <p class="text-slate-400 text-sm">Etch your name into the world's ancient tapestry.</p>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase">True Name</label>
                        <input id="char-name" type="text" placeholder="Enter name..." class="w-full px-4 py-4 bg-slate-950 border border-slate-700 rounded-xl text-white font-medium focus:outline-none focus:border-indigo-500 text-lg">
                    </div>

                    <div class="space-y-2">
                        <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase">Gender Alignment</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setGender(this, 'Male')" class="gender-btn py-3 bg-slate-800 hover:bg-slate-700 text-sm text-slate-300 rounded-xl border border-slate-700 font-medium transition-all">Male</button>
                            <button onclick="setGender(this, 'Female')" class="gender-btn py-3 bg-slate-800 hover:bg-slate-700 text-sm text-slate-300 rounded-xl border border-slate-700 font-medium transition-all">Female</button>
                            <button onclick="setGender(this, 'Non-Binary')" class="gender-btn py-3 bg-slate-800 hover:bg-slate-700 text-sm text-slate-300 rounded-xl border border-slate-700 font-medium transition-all">Non-Binary</button>
                        </div>
                    </div>

                    <button onclick="submitCharacter()" class="w-full mt-4 py-4 bg-indigo-600 hover:bg-indigo-500 font-bold text-white rounded-xl active:scale-95 transition-all shadow-lg shadow-indigo-900/20">
                        Cross the Threshold ⚡
                    </button>
                </div>
            `;
        }

        function setGender(btnElement, genderVal) {
            document.querySelectorAll('.gender-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-500');
                btn.classList.add('bg-slate-800', 'text-slate-300', 'border-slate-700');
            });
            btnElement.classList.remove('bg-slate-800', 'text-slate-300', 'border-slate-700');
            btnElement.classList.add('bg-indigo-600', 'text-white', 'border-indigo-500');
            gameState.gender = genderVal;
        }

        function submitCharacter() {
            const inputName = document.getElementById('char-name').value.trim();
            if (!inputName) {
                alert('A name is strictly required.');
                return;
            }
            if (!gameState.gender) {
                alert('Please select your gender profile.');
                return;
            }
            gameState.name = inputName;
            updateHUD();
            renderStoryLoop();
        }

        // Dynamic Romance Engine
        function getRomancePartner() {
            const gender = gameState.gender;
            if (gender === 'Male') return { name: 'Lyra', role: 'the Fierce Elven Ranger' };
            if (gender === 'Female') return { name: 'Garrick', role: 'the Charming Vanguard Knight' };
            return { name: 'Eldrin', role: 'the Rogue High Elf Mage' }; // Non-Binary/Default Track
        }

        // Pure Fantasy World Atmosphere Pools
        const storyAtmosphere = [
            "Heavy morning mist clings to the moss-covered castle ruins as you trek forward.",
            "You press deeper into the Whispering Woods, the ancient trees rustling with latent mana.",
            "A dragon's shadow sweeps across the forest canopy, forcing the party to dive into the thick brush.",
            "The party navigates a crumbling underground catacomb in search of a legendary enchanted relic."
        ];

        // Core Dynamic 100-Chapter Engine Layout
        function renderStoryLoop() {
            updateHUD();
            const partner = getRomancePartner();
            const current = gameState.currentChapter;
            let chapterText = "";
            let choices = [];

            if (current === 1) {
                chapterText = `You gasp for air, collapsing onto a bed of damp earth and pine needles. The blinding light of an intricate summoning circle fades on the ground beneath you. Your head throbs, and your clothes are completely out of place here. Reaching into your pocket, you pull out your Earth cell phone—there is zero service, but its offline screen flickers to life, strangely vibrating in sync with the ambient energy. As you stand up trying to process your new body's **${gameState.subType}** abilities, a branch snaps. ${partner.name}, ${partner.role}, drops from the canopy above with a weapon drawn. "State your name and business, traveler! I saw the summoning rift from the valley!"`;
                choices = [
                    { text: `🤝 Lower your hands and offer a peaceful explanation`, romance: 1 },
                    { text: `🛡️ Brace your posture and prepare for a sudden duel`, romance: 0 }
                ];
            } else if (current === 100) {
                chapterText = `The ancient obsidian throne room shakes violently. The High Demon Lord's magical core cracks open under the sheer weight of your maximum tier spells. ${partner.name} stands bloodied but defiant by your side at the edge of the altar. Your cell phone, humming with absolute runic feedback in your pocket, flashes a warning. This is the absolute climax of your journey. One final strike will seal the dark rift forever.`;
                choices = [
                    { text: `🌌 Channel your final class convergence spell`, romance: 0 }
                ];
            } else if (current % 10 === 0) {
                // Romance Milestone Chapters (Every 10 chapters)
                chapterText = `The crackle of the campfire casts long shadows against the ancient stone archway. While resting for the night, you check your cell phone—the battery is holding steady, acting as a small comfort from home. ${partner.name} walks over and sits closely beside you on a log, watching the sparks rise into the dark sky. "${gameState.name}... I've watched you fight. You possess a strange wisdom, and you look at that glowing mirror tool like a lost treasure. When this war is finally won... do you think you'll try to find a way back to your world, or stay?"`;
                choices = [
                    { text: `❤️ "My world is wherever you are now. I'm staying."`, romance: 2 },
                    { text: `✨ "I have to find a way back home, no matter what."`, romance: -1 }
                ];
            } else {
                // Procedural Loop for Chapters 2-99 with Class-Specific Nodes
                const atmosphere = storyAtmosphere[current % storyAtmosphere.length];
                
                if (current % 3 === 0) {
                    chapterText = `${atmosphere} Suddenly, a magical trap triggers! Arcane sigils glow beneath your boots. Your cell phone screen flashes brightly in your hand, its internal sensors wildly picking up a heavy surge of elemental energy customized to your exact **${gameState.subType}** signature.`;
                    
                    // Specialized class choices
                    if (gameState.subType === 'Knight') {
                        choices = [
                            { text: `🛡️ [Knight] Drive your bulwark shield into the dirt to absorb the shockwave`, romance: 0 },
                            { text: `⚔️ [Knight] Use your heavy plate armor to plow straight through the barrier`, romance: 1 }
                        ];
                    } else if (gameState.subType === 'Summoner') {
                        choices = [
                            { text: `🔮 [Summoner] Manifest your ethereal familiar to absorb the raw mana surge`, romance: 1 },
                            { text: `⚡ [Summoner] Shape the loose magical currents into a counter-spell rift`, romance: 0 }
                        ];
                    } else if (gameState.subType === 'Assassin') {
                        choices = [
                            { text: `🗡️ [Assassin] Blink through the shadow grid to completely bypass the blast radius`, romance: 1 },
                            { text: `💨 [Assassin] Use a smoke trick and dive behind a crumbling boulder`, romance: 0 }
                        ];
                    } else { // Ranger
                        choices = [
                            { text: `🏹 [Ranger] Use your precision tracking to target the trap's glowing anchor crystal`, romance: 1 },
                            { text: `🎯 [Ranger] Leap backward onto a high stone ledge to secure clear vision`, romance: 0 }
                        ];
                    }
                } else {
                    // Standard Exploration / Tactical Chapters
                    chapterText = `${atmosphere} The cobblestone road splits before you. Your cell phone's camera screen clearly shows the terrain lines ahead: a dangerous, dark shortcut traversing an untamed cavern fissure, versus a slow, highly fortified path tracking securely around the mountain edge.`;
                    choices = [
                        { text: `🏃 Venture into the dark, unpredictable cavern shortcut`, romance: 0 },
                        { text: `⛰️ Keep to the long, safe mountain rim defensive trail`, romance: 1 }
                    ];
                }
            }

            // High-Fantasy HUD Container Layout (Replacing R1 sci-fi jargon)
            const runtimeDescriptionText = `
                <p class="text-slate-300 leading-relaxed font-normal">${chapterText}</p>
                <div class="mt-4 pt-4 border-t border-slate-800/50 flex justify-between text-[11px] text-slate-500 font-mono">
                    <span>📱 PHONE BATTERY: ${(100 - (current * 0.4)).toFixed(0)}%</span>
                    <span>MANA FREQUENCY: ${(current * 12.4).toFixed(0)} Hz</span>
                </div>
            `;

            // Render Buttons
            const buttonsHTML = choices.map(choice => `
                <button onclick="handleChoice(${choice.romance})" class="w-full py-3.5 px-5 bg-slate-800 hover:bg-slate-700 active:bg-indigo-900 border border-slate-700 hover:border-indigo-500 text-left text-white font-medium rounded-xl transition-all flex items-center space-x-3 group">
                    <span class="flex-1 text-sm md:text-base">${choice.text}</span>
                    <span class="text-slate-500 group-hover:text-indigo-400 text-xs font-bold font-mono">▶</span>
                </button>
            `).join('');

            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-between h-full">
                    <div class="flex-1 pr-1 overflow-y-auto space-y-4 mb-4">
                        ${runtimeDescriptionText}
                    </div>
                    <div class="space-y-2 shrink-0 pt-2 bg-slate-900">
                        ${buttonsHTML}
                    </div>
                </div>
            `;
        }

        function handleChoice(romanceMod) {
            gameState.romanceScore += romanceMod;
            
            if (gameState.currentChapter === 100) {
                renderEndGameScreen();
            } else {
                gameState.currentChapter++;
                renderStoryLoop();
            }
        }

        function renderEndGameScreen() {
            hud.classList.add('hidden');
            let endTitle = "";
            let endBody = "";
            let bgClass = "";
            const partner = getRomancePartner();

            if (gameState.romanceScore >= 12) {
                bgClass = "border-emerald-500/30 bg-emerald-950/20";
                endTitle = "🏆 True Happy Ending: Bond Eternal";
                endBody = `The final 100-chapter cataclysm completely clears. The dark rifts are permanently sealed, and peace settles across the kingdoms. Your cell phone finally screen goes black as its battery drains completely—but you don't care. By your side, ${partner.name} takes your hand as a bright new kingdom unfurls before you. Your bond has broken all boundaries, securing an absolute harmonious lifetime together. Campaign Complete!`;
            } else {
                bgClass = "border-amber-500/30 bg-amber-950/20";
                endTitle = "⏳ Neutral Ending: A World Apart";
                endBody = `The dark forces collapse at the 100-chapter mark, and the realm is saved. However, your emotional logs with ${partner.name} lacked the true depth to override your longing for home. A shimmering residual rift opens before you, and your phone vibrates with an active Earth time signal. You step through, returning to your room, leaving the memories of a magical realm and a partner behind forever.`;
            }

            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-center space-y-6">
                    <div class="p-6 border rounded-2xl ${bgClass} space-y-4">
                        <h2 class="text-xl font-bold text-center text-white">${endTitle}</h2>
                        <p class="text-slate-300 text-sm leading-relaxed text-center">${endBody}</p>
                    </div>
                    <div class="space-y-2 text-center text-xs text-slate-500 font-mono">
                        <p>Final Log: ${gameState.name} | ${gameState.subType}</p>
                        <p>Affinity Score: [${gameState.romanceScore}]</p>
                    </div>
                    <button onclick="resetGame()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 font-bold text-white rounded-xl active:scale-95 transition-all">
                        Re-initialize World Entry Loop 🔁
                    </button>
                </div>
            `;
        }

        function resetGame() {
            gameState = {
                subType: '',
                name: '',
                gender: '',
                currentChapter: 1,
                romanceScore: 0
            };
            initClassScreen();
        }

        // Initialize Application Context Frame
        initClassScreen();
    </script>
</body>
</html>
