<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isekai Realms: D&D Chronicles</title>
    <!-- Tailwind CSS for mobile portrait layout -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; font-size: 16px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 flex justify-center items-center min-h-screen p-4 select-none">

    <!-- Mobile Screen Frame Container -->
    <div class="w-full max-w-md bg-slate-900 border-2 border-slate-800 rounded-2xl shadow-2xl flex flex-col h-[90vh] overflow-hidden">
        
        <!-- Game Header / HUD -->
        <header class="bg-slate-950 px-6 py-4 border-b border-slate-800 flex justify-between items-center shrink-0">
            <h1 class="text-xs font-bold tracking-widest text-indigo-400 uppercase font-mono" id="hud-act">Act I: Awakening</h1>
            <div id="hud-stats" class="text-xs text-slate-400 hidden">
                <span id="hud-name" class="font-semibold text-slate-200"></span> | 
                <span id="hud-chapter" class="text-amber-400 font-semibold">Ch 1/100</span>
            </div>
        </header>

        <!-- Dynamic Game Content Viewport -->
        <main id="game-viewport" class="flex-1 overflow-y-auto p-6 flex flex-col justify-between space-y-6">
            <!-- Content Injected Dynamically -->
        </main>
        
    </div>

    <script>
        // Core Game State Model
        let gameState = {
            subType: '',       // 'Summoner' | 'Ranger' | 'Assassin' | 'Knight'
            name: '',
            gender: '',        
            partnerPref: '',   
            currentChapter: 1, 
            romanceScore: 0,   
        };

        const view = document.getElementById('game-viewport');
        const hud = document.getElementById('hud-stats');
        const hudAct = document.getElementById('hud-act');

        function checkExistingSave() {
            const localData = localStorage.getItem('isekai_chronicles_save');
            return localData ? JSON.parse(localData) : null;
        }

        function updateHUD() {
            const ch = gameState.currentChapter;
            if (ch <= 20) hudAct.innerText = "Act I: The Awakening";
            else if (ch <= 40) hudAct.innerText = "Act II: Borderlands Guild";
            else if (ch <= 60) hudAct.innerText = "Act III: Shadow Descent";
            else if (ch <= 80) hudAct.innerText = "Act IV: Shattered Citadel";
            else hudAct.innerText = "Act V: Obsidian Apex";

            if (gameState.name) {
                hud.classList.remove('hidden');
                document.getElementById('hud-name').innerText = `${gameState.name} (${gameState.subType})`;
                document.getElementById('hud-chapter').innerText = `Ch ${ch}/100`;
            } else {
                hud.classList.add('hidden');
            }
        }

        function initMainMenu() {
            updateHUD();
            const savedState = checkExistingSave();
            let resumeButtonHTML = "";
            
            if (savedState && savedState.currentChapter > 1 && savedState.currentChapter <= 100) {
                resumeButtonHTML = `
                    <button onclick="resumeSavedGame()" class="w-full py-4 px-6 bg-amber-600 hover:bg-amber-500 text-white font-bold rounded-xl transition-all border border-amber-500/30 active:scale-95 flex justify-between items-center shadow-lg shadow-amber-900/20">
                        <span>📜 Resume Journey</span>
                        <span class="text-xs bg-amber-950/50 px-2 py-1 rounded">Ch ${savedState.currentChapter}</span>
                    </button>
                `;
            }

            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-center space-y-6">
                    <div class="text-center space-y-2">
                        <h2 class="text-3xl font-bold text-white tracking-tight">Isekai Realms</h2>
                        <p class="text-slate-400 text-sm">Cross the dimensional gate into the D&D ruleset.</p>
                    </div>
                    <div class="flex flex-col space-y-3">
                        ${resumeButtonHTML}
                        <button onclick="initClassScreen()" class="w-full py-4 px-6 bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-center rounded-xl transition-all border border-indigo-500/30 active:scale-95 shadow-lg shadow-indigo-900/20">
                            ✨ Begin New Awakening
                        </button>
                    </div>
                </div>
            `;
        }

        function resumeSavedGame() {
            const savedState = checkExistingSave();
            if (savedState) {
                gameState = savedState;
                updateHUD();
                renderStoryLoop();
            }
        }

        function initClassScreen() {
            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-center space-y-6">
                    <div class="text-center space-y-2">
                        <h2 class="text-2xl font-bold text-white">Select Your Class</h2>
                        <p class="text-slate-400 text-sm">Your physical awakening ruleset inside the magical plane.</p>
                    </div>
                    <div class="flex flex-col space-y-3">
                        <button onclick="selectClass('Summoner')" class="w-full py-4 px-6 bg-indigo-950 hover:bg-indigo-900 text-left font-semibold text-white rounded-xl transition-all border border-indigo-500/30 active:scale-95 flex justify-between items-center">
                            <span>🔮 Summoner</span> <span class="text-xs text-indigo-400">Ethereal Pets</span>
                        </button>
                        <button onclick="selectClass('Ranger')" class="w-full py-4 px-6 bg-emerald-950 hover:bg-emerald-900 text-left font-semibold text-white rounded-xl transition-all border border-emerald-500/30 active:scale-95 flex justify-between items-center">
                            <span>🏹 Ranger</span> <span class="text-xs text-emerald-400">Precision Strikes</span>
                        </button>
                        <button onclick="selectClass('Assassin')" class="w-full py-4 px-6 bg-rose-950 hover:bg-rose-900 text-left font-semibold text-white rounded-xl transition-all border border-rose-500/30 active:scale-95 flex justify-between items-center">
                            <span>🗡️ Assassin</span> <span class="text-xs text-rose-400">Shadow Stepping</span>
                        </button>
                        <button onclick="selectClass('Knight')" class="w-full py-4 px-6 bg-slate-800 hover:bg-slate-700 text-left font-semibold text-white rounded-xl transition-all border border-slate-600 active:scale-95 flex justify-between items-center">
                            <span>🛡️ Knight</span> <span class="text-xs text-slate-400">Heavy Bulwark</span>
                        </button>
                    </div>
                </div>
            `;
        }

        function selectClass(choice) {
            gameState.subType = choice;
            initCharacterCreation();
        }

        function initCharacterCreation() {
            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-center space-y-5">
                    <div class="text-center space-y-1">
                        <h2 class="text-xl font-bold text-white">Identity Awakening</h2>
                        <p class="text-slate-400 text-sm">Etch your parameters into the tapestry.</p>
                    </div>
                    <div class="space-y-1">
                        <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase">True Name</label>
                        <input id="char-name" type="text" placeholder="Enter name..." class="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-xl text-white font-medium focus:outline-none focus:border-indigo-500 text-base">
                    </div>
                    <div class="space-y-1">
                        <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase">Your Alignment</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setStateVar(this, 'gender', 'Male', 'g-btn')" class="g-btn py-2.5 bg-slate-800 text-xs text-slate-300 rounded-xl border border-slate-700 font-medium transition-all">Male</button>
                            <button onclick="setStateVar(this, 'gender', 'Female', 'g-btn')" class="g-btn py-2.5 bg-slate-800 text-xs text-slate-300 rounded-xl border border-slate-700 font-medium transition-all">Female</button>
                            <button onclick="setStateVar(this, 'gender', 'Non-Binary', 'g-btn')" class="g-btn py-2.5 bg-slate-800 text-xs text-slate-300 rounded-xl border border-slate-700 font-medium transition-all">Non-Binary</button>
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase">Who catches your eye in this realm?</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setStateVar(this, 'partnerPref', 'Female', 'p-btn')" class="p-btn py-2.5 bg-slate-800 text-xs text-slate-300 rounded-xl border border-slate-700 font-medium transition-all">Women</button>
                            <button onclick="setStateVar(this, 'partnerPref', 'Male', 'p-btn')" class="p-btn py-2.5 bg-slate-800 text-xs text-slate-300 rounded-xl border border-slate-700 font-medium transition-all">Men</button>
                            <button onclick="setStateVar(this, 'partnerPref', 'Non-Binary', 'p-btn')" class="p-btn py-2.5 bg-slate-800 text-xs text-slate-300 rounded-xl border border-slate-700 font-medium transition-all">Fluid</button>
                        </div>
                    </div>
                    <button onclick="submitCharacter()" class="w-full mt-2 py-3.5 bg-indigo-600 hover:bg-indigo-500 font-bold text-white rounded-xl active:scale-95 transition-all shadow-lg shadow-indigo-900/20">
                        Cross the Threshold ⚡
                    </button>
                </div>
            `;
        }

        function setStateVar(btnElement, variable, value, groupClass) {
            document.querySelectorAll('.' + groupClass).forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-500');
                btn.classList.add('bg-slate-800', 'text-slate-300', 'border-slate-700');
            });
            btnElement.classList.remove('bg-slate-800', 'text-slate-300', 'border-slate-700');
            btnElement.classList.add('bg-indigo-600', 'text-white', 'border-indigo-500');
            gameState[variable] = value;
        }

        function submitCharacter() {
            const inputName = document.getElementById('char-name').value.trim();
            if (!inputName) return alert('A name is strictly required.');
            if (!gameState.gender) return alert('Please select your identity profile.');
            if (!gameState.partnerPref) return alert('Please select your companion preference.');
            gameState.name = inputName;
            
            localStorage.removeItem('isekai_chronicles_save');
            updateHUD();
            renderStoryLoop();
        }

        function getRomancePartner() {
            const pref = gameState.partnerPref;
            if (pref === 'Female') return { name: 'Lyra', role: 'the Fierce Elven Ranger' };
            if (pref === 'Male') return { name: 'Garrick', role: 'the Charming Vanguard Knight' };
            return { name: 'Eldrin', role: 'the Rogue High Elf Mage' }; 
        }

        // Master Act Scenarios & Core Themes (Fully Expanded to cover all unique 100 chapters without sharing elements)
        const actThemes = {
            1: {
                name: "Act I: The Awakening & The Wilds",
                obstacles: [
                    { t: "A massive, thick briar patch tangled with glowing purple toxic thorns completely chokes off the overgrown path ahead.", p: "Ranger",
                      o: [
                          { text: "🍎 [Sleight of Hand] Feed nearby wild berries to local woodland critters to clear a crawling route", r: 1, res: "The critters pack together, chewing rapidly through the root systems to open a safe path." },
                          { text: "🗣️ [Charisma (Intimidation)] Brandish a lit torch and forcefully yell to clear the path", r: -1, res: "The flame ignites a small pocket of poison briar gas, stinging your lungs and irritating your companion." },
                          { text: "⚔️ [Dexterity (Acrobatics)] Use nearby low boulders to vault cleanly over the wall", r: 0, res: "You execute a clean aerial leap, clearing the thorns completely and landing safely on the opposite path." },
                          { text: "🐾 [Class: Ranger] Apply Natural Kinship to pacify the living plant matrices", r: 2, res: "You whistle a woodland melody. The toxic thorns smooth out, parting like an organic curtain to let you walk through." }
                      ]},
                    { t: "The mountain path ends abruptly at a broken wooden suspension bridge spanning a yawning canyon. The support ropes are frayed to a single thread over the abyss.", p: "Ranger",
                      o: [
                          { text: "🔍 [Intelligence (Investigation)] Analyze the line stress to step precisely on support joints", r: 1, res: "You map out a safe stepping route, navigating the swaying structure safely." },
                          { text: "🏃 [Strength (Athletics)] Sprint across at top speed before the rotten planks can detach", r: 0, res: "You bolt forward. Planks splinter into the abyss behind your boots, but you make it across safely." },
                          { text: "🗣️ [Charisma (Persuasion)] Suggest that your companion test the lines first", r: -1, res: "They give you an icy look, crossing effortlessly on their own but leaving group trust damaged." },
                          { text: "🏹 [Class: Ranger] Fire a high-tension grapple rope to reinforce the anchor framework", r: 2, res: "Your arrow embeds a steel-bound cable that turns the hazard into a completely rigid, stable walkway." }
                      ]},
                    { t: "A dense sheet of freezing mountain fog rolls in, reducing visibility to zero and clouding your orientation lines.", p: "Ranger",
                      o: [
                          { text: "🧭 [Wisdom (Survival)] Scan the moss and rock slopes for natural geographic markers", r: 1, res: "You maintain a solid true heading, walking safely through the whiteout." },
                          { text: "✊ [Charisma (Intimidation)] Command the party to march onward blindly at double pace", r: -1, res: "You lead the party straight into a deep mud bog, losing valuable time cleaning your gear." },
                          { text: "🏃 [Dexterity (Stealth)] Move slowly in a tight single-file line holding a shared guide rope", r: 0, res: "You navigate the treacherous ridge carefully, keeping everyone connected in the whiteout." },
                          { text: "🐾 [Class: Ranger] Listen to the low frequency calls of mountain birds to navigate the cliffs", r: 2, res: "Using raw directional tracking, you read the avian echoes to perfectly avoid the cliff traps." }
                      ]}
                ],
                combats: ["a territorial pack of feral dire-wolves tracking your planar scent", "a mass of rotted roots and glowing mud eyes forming a Swamp Horror", "a screeching flock of corrupted Grave Crows diving out of the mountain mist"]
            },
            2: {
                name: "Act II: The Borderlands & The Guild",

                    { t: "A heavy ironwood gate seals the entrance to the Borderlands Adventurers Guild house, blocked by an angry mercenary mob.", p: "Assassin",
                      o: [

                          { text: "✊ [Charisma (Persuasion)] State your urgent business calmly to the viewer slot, requesting entry", r: 1, res: "Your professional explanation convinces the gate warden, and the heavy gates slide open." },
                          { text: "🌿 [Intelligence (Investigation)] Scan the surrounding stonework for a hidden side latch", r: -1, res: "You search aimlessly while the mercenary mob grows increasingly hostile to your presence." },

                      ]},
                    { t: "Deep inside a corrupt local merchant warehouse, you locate a chest trapped with an active explosive fire-rune sigil.", p: "Assassin",

                          { text: "📜 [Intelligence (Arcana)] Attempt to delicately unweave the core magical parameters of the sigil", r: 1, res: "You trace the energy lines, neutralizing the explosive charge safely to reveal the loot." },
                          { text: "🏃 [Dexterity (Stealth)] Try to hook the contents from a distance without triggering the field", r: 0, res: "You successfully fish out a map file just before the chest snaps shut, narrowly avoiding a blast." },
                          { text: "😡 [Charisma (Intimidation)] Bash the lid open with a heavy iron bar, hoping to tank the blast", r: -1, res: "The chest explodes, singing your armor. Your partner sighs deeply at your recklessness." },

                    { t: "A massive sewer drainage valve blocking your path down the aqueducts is controlled by a frozen brass gear layout.", p: "Assassin",

                          { text: "🔧 [Intelligence (Investigation)] Study the gear alignment ratios to unjam the primary drive wheel", r: 1, res: "You safely release the locking pin, causing the foul water to drain away smoothly." },
                          { text: "💥 [Strength (Athletics)] Forcefully throw your weight against the heavy valve crank lever", r: 0, res: "With a loud groan, the metal yields under your muscle power, slowly raising the internal gate." },

                obstacles: [
                    { t: "An ancient, volatile magical font hums inside a dark cavern fissure, leaking raw elements across the underground trail.", p: "Summoner",
                      o: [
                          { text: "📜 [Intelligence (Arcana)] Perform a containment seal chant to ground the leaking energy", r: 1, res: "Your precise focus stabilizes the leak, calming the air and clearing the primary pathway." },
                          { text: "🏃 [Dexterity (Stealth)] Quietly stick to the dark cavern wall shadows to avoid catching aggro", r: 0, res: "Pressing flat against the granite, you slowly crawl past the active radius without disturbing the font." },
                          { text: "🪨 [Strength (Athletics)] Hurl heavy cavern stalactites to break the font's power crystals", r: -1, res: "The impact shatters the crystals, causing a miniature magical backlash that leaves your ears ringing." },
                          { text: "🔮 [Class: Summoner] Order your ethereal companion animal to siphon the elemental drift away", r: 2, res: "Your familiar steps forward, inhaling the raw energy particles and safely neutralizing the hazard." }
                      ]},
                    { t: "The cavern floor gives way, leaving only a narrow, slippery ledge above a lake of churning boiling magma.", p: "Summoner",

                          { text: "👟 [Dexterity (Acrobatics)] Carefully balance your weight, moving slowly along the rock face", r: 1, res: "You cross the ledge smoothly, guiding your partner to safe handholds along the cavern wall." },

                          { text: "🗣️ [Charisma (Intimidation)] Forcefully tell your partner to look away while you frantically scramble across", r: -1, res: "Your panic strains the mood. You cross safely, but your lack of composure damages their trust." },
                          { text: "🔮 [Class: Summoner] Manifest a solid bridge of condensed mana to cross the heat gap perfectly", r: 2, res: "You conjure a shimmering path of raw light, walking across the hazard safely." }

                    { t: "The grand archives door inside a sunken city is bound by a massive blood-magic sigil that burns all flesh.", p: "Summoner",

                      ]}
                ],
                combats: ["blind cave stalker predators hunting your position purely by sound tracking", "shadow-cultist ambushers attacking your camp out of the cavern darkness", "a giant flying swarm of animated daggers protecting the sunken archives"]
            },
            4: {
                name: "Act IV: The Shattered Citadel",

                          { text: "🪙 [Charisma (Deception)] Feign a panic alarm elsewhere to convince the guard to rotate vectors", r: -1, res: "The guard registers the alarm but calls for backup instead of leaving, keeping the tunnel blocked." },
                          { text: "👑 [Charisma (Persuasion)] Appeal to their honor regarding the incoming global siege line threat", r: 1, res: "Your genuine appeal resonates. Realizing the urgency of your quest, the sentinel steps aside." },
                          { text: "👟 [Dexterity (Stealth)] Wait for the torch-fire to flicker down and attempt a shadow slip bypass", r: 0, res: "You time the guard's rotation, slipping noiselessly into the dark tunnel without creating a sound." },
                          { text: "🛡️ [Class: Knight] Flaunt your high-order Vanguard crest to claim absolute command status", r: 2, res: "The sentinel recognizes the legendary crest, snapping to strict military attention and granting access." }
                      ]},
                    { t: "An exploding artillery shell drops a heavy steel portcullis down, trapping your partner inside a burning corridor.", p: "Knight",
                      o: [
                          { text: "🌿 [Intelligence (Investigation)] Search for the emergency mechanical override gear wheels nearby", r: 1, res: "You locate the manual winch, cranking it with total focus to raise the gate just enough." },
                          { text: "🗣️ [Charisma (Persuasion)] Call out encouraging words, guiding them to find a different flanking door", r: 0, res: "Your calm voice keeps them steady. They find an alternate air duct, meeting back up with you." },
                          { text: "🪙 [Charisma (Deception)] Tell them you are leaving to find help, running ahead alone", r: -1, res: "They feel completely abandoned in the heat. They escape on their own, but trust is fractured." },
                          { text: "🛡️ [Class: Knight] Ram your shield under the dropping iron teeth, bracing the entire load manually", r: 2, res: "Using absolute physical strength, you hold the crushing weight on your shoulders while they dive out." }
                      ]},
                    { t: "A collapsing stone courtyard bridge leaves the path fragmented while enemy trebuchets target the area.", p: "Knight",

                          { text: "🗣️ [Charisma (Intimidation)] Stand in the open and roar a challenge, losing focus on foot placement", r: -1, res: "A near-miss explosion throws you into the dust, bruising your leg and forcing your partner to haul you up." },
                          { text: "🛡️ [Class: Knight] Raise your bulwark aegis shield to fully absorb the flying shrapnel for the party", r: 2, res: "You form an iron wall against the fragments, deflecting the lethal debris seamlessly." }
                      ]}
                ],
                combats: ["an elite crimson Wyvern diving from the battlements breathing raw flame", "a deadly squad of elite dark spell-swords wielding high-voltage lightning blades", "an undead Death Knight wielding a massive frost-imbued greatsword"]
            },
            5: {
                name: "Act V: The Obsidian Apex",
                obstacles: [
                    { t: "The entry stairs up the frozen mountain peak are covered in slick black ice under a thin atmosphere.", p: "Knight",
                      o: [
                          { text: "🔍 [Intelligence (Investigation)] Analyze the rock fractures to follow secure stone handholds", r: 1, res: "You scale the treacherous ascent without letting anyone lose their footing." },
                          { text: "🏃 [Strength (Athletics)] Brute force your way up the icy slope using weapon blades as spikes", r: 0, res: "You aggressively hammer your way up, reaching the summit with burning muscles." },

                          { text: "🛡️ [Class: Knight] Plant your bulwark shield firmly into the ice to anchor a climbing tether line", r: 2, res: "You create an absolute anchor point, transforming a deadly hazard into a routine rope walk." }
                      ]}
                ],
                combats: ["a giant Obsidian Golem constructed from the mountain's living rock core", "the High Demon Lord's Inner Council Mages casting fields of chain lightning", "the final chaotic shadows of the high throne room matrix dimensions"]
            }
        };

        function getActiveActTheme(ch) {
            if (ch <= 20) return actThemes[1];
            if (ch <= 40) return actThemes[2];
            if (ch <= 60) return actThemes[3];
            if (ch <= 80) return actThemes[4];
            return actThemes[5];
        }

        // Core D&D Campaign Engine Router
        function getChapterData(ch, partner) {
            const currentAct = getActiveActTheme(ch);
            
            // Standard Explicit Milestone Router Loops
            if (ch === 1) {
                return {
                    desc: `You gasp for air, collapsing onto a bed of damp earth and pine needles. The blinding light of an intricate summoning circle fades on the ground beneath you. Your head throbs, and your clothes are completely out of place here. Reaching into your pocket, you pull out your Earth cell phone—there is zero service, but its offline screen flickers to life, strangely vibrating in sync with the ambient energy. As you stand up trying to process your new body's **${gameState.subType}** abilities, a branch snaps. ${partner.name}, ${partner.role}, drops from the canopy above with a weapon drawn. "State your name and business, traveler! I saw the summoning rift from the valley!"`,
                    options: [
                        { text: "🤝 [Charisma (Persuasion)] Lower your hands and offer a peaceful explanation", romance: 1, textOutcome: "Your honest, open posture puts them at ease. Lowering the weapon slightly, they listen to your bizarre tale with growing curiosity." },
                        { text: "🛡️ [Strength (Athletics)] Brace your posture and prepare for an immediate duel", romance: 0, textOutcome: "Steel meets steel with a violent ring! The quick exchange tests your baseline reflexes, earning a nod of begrudging tactical respect." },
                        { text: "🪙 [Charisma (Deception)] Claim you're a high-ranking traveling merchant who got lost", romance: -1, textOutcome: "They scan your strange modern clothes, narrowing their eyes in deep suspicion at the obviously fabricated explanation." }
                    ]
                };
            }
            
            if (ch === 99) {
                return {
                    desc: `[ACT V: FINAL Apex] The High Demon Lord shatters into dust! However, his dying curse triggers a catastrophic structural collapse of the obsidian throne room. A massive falling stone column is plummeting straight toward an unconscious, exhausted ${partner.name}! Simultaneously, your phone flashes with a blinding portal signal—your one chance to warp safely back to Earth is active right now.`,
                    options: [
                        { text: "❤️ [SACRIFICE - AFFINITY +10] Throw yourself over them, using your body to tank the blast!", romance: 10, textOutcome: "Without a single thought for yourself, you dive over them. The debris smashes down, fracturing your armor but keeping them completely untouched as the portal shatters." },
                        { text: "🏃 [RUN - AFFINITY Neutral] Drag them with you as you make a frantic dive toward the exit lines", romance: 0, textOutcome: "You frantically grab them by the collar, hauling their weight across the stone tiling just as the column crashes onto the exact space you occupied." },
                        { text: "✨ [LEAVE - AFFINITY Down] Dive directly into the glowing phone portal to secure your safe return home", romance: -5, textOutcome: "Driven by the raw instinct to survive, you leap backward into the light. The dimensional gate snaps shut behind you, leaving the realm behind forever." }
                    ]
                };
            }

            if (ch === 100) {
                return {
                    desc: `The cataclysm settles completely. The dust clears over the ruined throne room floor. The dark rifts are silent, and the realm has been decisively saved. Standing among the remnants of the final battle line, you turn toward ${partner.name} to face the final calculation of your timeline journey.`,
                    options: [{ text: "🌌 Complete the journey parameters and witness your final fate.", romance: 0, textOutcome: "The parameters compile your decisions..." }]
                };
            }

            // Campfire Milestones (Every 10 Chapters)
            if (ch % 10 === 0) {
                return {
                    desc: `[Campfire Respite - Chapter ${ch}] The camp is quiet as you check your phone screen. ${partner.name} sits down near the embers. "${gameState.name}... I've monitored your unique skills. You don't match the baseline locals of this realm. When this crisis is conquered... do you truly intend to slip back to your home world, or stay?"`,
                    options: [
                        { text: "❤️ [Affinity +1] \"My home is right here next to you now. I'm staying.\"", romance: 2, textOutcome: "A beautiful smile crosses their face in the warm firelight. They reach out, squeezing your hand with absolute devotion." },
                        { text: "⚖️ [Affinity Neutral] \"I honestly don't know what's left for me there or here. Let's just focus on surviving.\"", romance: 0, textOutcome: "They nod silently, staring deeply into the orange sparks, respecting the heavy weight of your perspective." },
                        { text: "✨ [Affinity -1] \"I have people back on Earth. I have to find a way back if it's possible.\"", romance: -1, textOutcome: "Their eyes dim slightly as they stare into the ashes, a quiet distance settling between you as reality hits." }
                    ]
                };
            }

            // Dynamic Step Calculations to fully separate all 100 entries from loops
            const isExploration = (ch % 2 === 0);
            const dataIndex = Math.floor(ch / 2) % currentAct.obstacles.length;
            
            if (isExploration) {
                const obs = currentAct.obstacles[dataIndex];
                // Remap options array explicitly into structural game schema
                return {
                    desc: `[Exploration Stage] Moving deeper through the region coordinates, the terrain shifts dramatically. <br><br><span class='text-white font-semibold'>Roadblock Objective:</span> ${obs.t}`,
                    perkClass: obs.p,
                    options: obs.o.map(opt => ({ text: opt.text, romance: opt.r, textOutcome: opt.res }))
                };
            } else {
                const combatText = currentAct.combats[ch % currentAct.combats.length];
                return {
                    desc: `[Combat Stage] Danger alerts spike! Moving along the campaign line, **${combatText}** surges forward with weapons drawn! ${partner.name} leaps into battle formation by your side!`,
                    options: [
                        { text: "⚔️ [Dexterity (Acrobatics)] Coordinate a swift flanking assault combo with your companion", romance: 1, textOutcome: "You time your advance perfectly, flashing past the target's shield line to expose a clean opening." },
                        { text: "🛡️ [Strength (Athletics)] Dig your boots in and draw the total combat aggro onto your stance", romance: 0, textOutcome: "You slam your weapon against your armor, forcing the enemy focus entirely onto your defensive stance." },
                        { text: "🏃 [Wisdom (Survival)] Pull back into the immediate layout brush to reassess structural weaknesses", romance: 1, textOutcome: "You duck behind cover, locating a major tactical exploit path to call out to your partner." },
                        { text: "😡 [Charisma (Intimidation)] Charge forward screaming a chaotic battle challenge", romance: -1, textOutcome: "Your wild assault breaks the party line. You deal damage, but leave your companion unprotected." }
                    ]
                };
            }
        }

        // Core Render Viewport Loop
        function renderStoryLoop() {
            updateHUD();
            const partner = getRomancePartner();
            const ch = gameState.currentChapter;
            const chData = getChapterData(ch, partner);
            
            let choices = [...chData.options];
            
            // Unlink 4th choice explicitly if character class doesn't match the roadblock specialty
            if (chData.perkClass && gameState.subType !== chData.perkClass && choices.length === 4) {
                choices.pop();
            }

            const runtimeDescriptionText = `
                <div class="space-y-3">
                    <p class="text-slate-300 leading-relaxed font-normal">${chData.desc}</p>
                </div>
                <div class="mt-4 pt-4 border-t border-slate-800/55 flex justify-between text-[11px] text-slate-500 font-mono">
                    <span>📱 PHONE: ${(100 - (ch * 0.4)).toFixed(0)}%</span>
                    <span>💘 AFFINITY: ${gameState.romanceScore}</span>
                </div>
            `;

            const buttonsHTML = choices.map(choice => {
                const escapedOutcome = choice.textOutcome.replace(/"/g, '&quot;').replace(/'/g, "\\'");
                const escapedAction = choice.text.replace(/"/g, '&quot;').replace(/'/g, "\\'");
                return `
                    <button onclick="renderConsequenceScreen('${escapedAction}', '${escapedOutcome}', ${choice.romance})" class="w-full py-3 px-4 bg-slate-800 hover:bg-slate-700 active:bg-indigo-900 border border-slate-700 hover:border-indigo-500 text-left text-white font-medium rounded-xl transition-all flex items-center space-x-3 group">
                        <span class="flex-1 text-xs md:text-sm leading-snug">${choice.text}</span>
                        <span class="text-slate-500 group-hover:text-indigo-400 text-xs font-bold font-mono shrink-0">▶</span>
                    </button>
                `;
            }).join('');

            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-between h-full">
                    <div class="flex-1 pr-1 overflow-y-auto space-y-4 mb-4">
                        ${runtimeDescriptionText}
                    </div>
                    <div class="space-y-2 shrink-0 pt-2 bg-slate-900">
                        ${buttonsHTML}
                    </div>
                </div>
            `;
        }

        function renderConsequenceScreen(actionTaken, outcomeText, scoreMod) {
            gameState.romanceScore += scoreMod;
            let affinityIconHTML = `<span>⚖️ Affinity Unchanged</span>`;
            if (scoreMod > 0) affinityIconHTML = `<span class="text-emerald-400 font-semibold">💘 Affinity Increased (+${scoreMod})</span>`;
            if (scoreMod < 0) affinityIconHTML = `<span class="text-rose-400 font-semibold">💔 Affinity Decreased (${scoreMod})</span>`;

            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-between h-full">
                    <div class="flex-1 overflow-y-auto space-y-4">
                        <div class="bg-slate-950 p-4 border border-slate-800 rounded-xl space-y-1">
                            <span class="text-[10px] font-mono tracking-wider text-indigo-400 uppercase block font-bold">Action Undertaken</span>
                            <p class="text-xs text-slate-400 italic">${actionTaken}</p>
                        </div>
                        <div class="space-y-2 pt-2">
                            <span class="text-[10px] font-mono tracking-wider text-amber-400 uppercase block font-bold">Result Timeline Outcome</span>
                            <p class="text-slate-200 leading-relaxed text-sm">${outcomeText}</p>
                        </div>
                    </div>
                    <div class="space-y-4 pt-4 border-t border-slate-800 shrink-0 bg-slate-900">
                        <div class="text-center text-xs">
                            ${affinityIconHTML}
                        </div>
                        <button onclick="advanceChapterSequence()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl active:scale-95 transition-all text-center flex justify-center items-center space-x-2 shadow-lg shadow-indigo-900/20">
                            <span>Advance Journey</span>
                            <span class="font-mono text-sm">▶</span>
                        </button>
                    </div>
                </div>
            `;
        }

        function advanceChapterSequence() {
            if (gameState.currentChapter === 100) {
                renderEndGameScreen();
            } else {
                gameState.currentChapter++;
                localStorage.setItem('isekai_chronicles_save', JSON.stringify(gameState));
                renderStoryLoop();
            }
        }

        function renderEndGameScreen() {
            hud.classList.add('hidden');
            let endTitle = "";
            let endBody = "";
            let bgClass = "";
            const partner = getRomancePartner();
            const finalScore = gameState.romanceScore;

            localStorage.removeItem('isekai_chronicles_save');

            if (finalScore >= 30) {
                bgClass = "border-emerald-500/30 bg-emerald-950/20";
                endTitle = "🏆 True Romance Ending: Bond Eternal";
                endBody = `The dark rifts are permanently sealed. Your phone screen goes completely black as its battery drains to zero—but it doesn't matter anymore. Turning your back on Earth entirely, you pull ${partner.name} into a deep kiss as a peaceful new kingdom unfurls before you. Your choices, culminating in a final heroic sacrifice, secured an absolute, legendary lifetime together. Campaign Complete!`;
            } else if (finalScore >= 10 && finalScore < 30) {
                bgClass = "border-cyan-500/30 bg-cyan-950/20";
                endTitle = "⚔️ Vanguard Ending: Solo Legend";
                endBody = `The realm is decisively saved. You choose to remain in this world, rising to prominence as a legendary Grand Champion of the realm. However, your connection with ${partner.name} remained balanced and strictly professional. You walk the battlements as trusted companions-in-arms, sharing mutual respect, but your romantic paths diverge as you rule separately.`;
            } else if (finalScore >= 0 && finalScore < 10) {
                bgClass = "border-amber-500/30 bg-amber-950/20";
                endTitle = "⏳ Lonely Ending: A World Apart";
                endBody = `The world is saved, but your consistent emphasis on returning home created an unbridgeable distance. A final, shimmering rift manifests before you. Without looking back, ${partner.name} leaves for the wild woods. You step through the gate alone, waking up back in your quiet Earth room. All you have left is a dead phone and memories of a magical world that will never see you again.`;
            } else {
                bgClass = "border-rose-500/30 bg-rose-950/20";
                endTitle = "💀 Bad Ending: Broken Lineage";
                endBody = `Your antagonistic decision paths completely fractured your party synergy mechanics. Under the pressure of the final battle, your tactical lines collapsed completely. ${partner.name} fell in battle trying to absorb a blow meant for you, and the unchecked rift overloads, consuming the entire kingdom in an explosion of dark energy. Total timeline failure.`;
            }

            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-center space-y-6">
                    <div class="p-6 border rounded-2xl ${bgClass} space-y-4">
                        <h2 class="text-xl font-bold text-center text-white">${endTitle}</h2>
                        <p class="text-slate-300 text-sm leading-relaxed text-center">${endBody}</p>
                    </div>
                    <div class="space-y-2 text-center text-xs text-slate-500 font-mono">
                        <p>Final Log: ${gameState.name} | ${gameState.subType}</p>
                        <p>Final Affinity Score: [${finalScore}]</p>
                    </div>
                    <button onclick="resetGame()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 font-bold text-white rounded-xl active:scale-95 transition-all">
                        Return to Gate Hub 🔁
                    </button>
                </div>
            `;
        }

        function resetGame() {
            gameState = { subType: '', name: '', gender: '', partnerPref: '', currentChapter: 1, romanceScore: 0 };
            initMainMenu();
        }

        initMainMenu();
    </script>
</body>
</html>
