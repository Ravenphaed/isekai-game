<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isekai Realms: D&D Chronicles</title>
    <!-- Tailwind CSS for mobile portrait layout -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; font-size: 16px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 flex justify-center items-center min-h-screen p-4 select-none">

    <!-- Mobile Screen Frame Container -->
    <div class="w-full max-w-md bg-slate-900 border-2 border-slate-800 rounded-2xl shadow-2xl flex flex-col h-[90vh] overflow-hidden">
        
        <!-- Game Header / HUD -->
        <header class="bg-slate-950 px-6 py-4 border-b border-slate-800 flex justify-between items-center shrink-0">
            <h1 class="text-xs font-bold tracking-widest text-indigo-400 uppercase font-mono" id="hud-act">Act I: Awakening</h1>
            <div id="hud-stats" class="text-xs text-slate-400 hidden">
                <span id="hud-name" class="font-semibold text-slate-200"></span> | 
                <span id="hud-chapter" class="text-amber-400 font-semibold">Ch 1/100</span>
            </div>
        </header>

        <!-- Dynamic Game Content Viewport -->
        <main id="game-viewport" class="flex-1 overflow-y-auto p-6 flex flex-col justify-between space-y-6">
            <!-- Content Injected Dynamically -->
        </main>
        
    </div>

            name: '',
            gender: '',        
            partnerPref: '',   
            currentChapter: 1, 
            romanceScore: 0,
            stats: { str: 5, dex: 5, int: 5, wis: 5 }
        };

        const view = document.getElementById('game-viewport');
        const hud = document.getElementById('hud-stats');
        const hudAct = document.getElementById('hud-act');

        // Core D&D Attribute Roadblocks Database
        const actThemes = {
            1: {
                name: "Act I: The Awakening & The Wilds",
                obstacles: [

                      o: [
                          { text: "👁️ [Wisdom Check] Quietly study the organic grid patterns to unweave a path vector", stat: "wis", r: 1, res: "Your focus maps out a clean crawl-line. You slide through the brush cleanly without triggering thorn traps.", failRes: "You misread the growth vectors. A toxic thorn tears your cloak, leaking trace poison that leaves you winded while your companion clears the path." },
                          { text: "👟 [Dexterity Check] Attempt a series of swift vaults across the surrounding high rocks", stat: "dex", r: 0, res: "You vault the boulders cleanly, dropping safely down on the opposite path.", failRes: "Your boot slips on a loose shale rock. You tumble back into the mud, bruising your shoulder before scrambling past dynamically." },
                          { text: "💪 [Strength Check] Forcefully slash your way through the smaller outer brambles", stat: "str", r: 0, res: "You clear a passage through brute force, though a stray prick makes your skin sting slightly.", failRes: "Your heavy swings lodge your weapon deep into a thick core vine. You lose valuable seconds tearing it free under stress." }

                    { t: "The mountain trail terminates at a fractured wooden suspension bridge. The support lines are frayed down to a single rotten wire strand over a bottomless void canyon.",

                          { text: "👟 [Dexterity Check] Execute a high-speed sprint across before the planks give way", stat: "dex", r: 0, res: "You charge forward light-footed. Rotted wood fragments plunge into the abyss behind your steps, but you clear the ridge.", failRes: "You lose your footing halfway through the sprint. You slide face-first across the remaining wet ropes, scraping your forearms raw before scrambling across." },
                          { text: "👁️ [Wisdom Check] Gauge the crosswinds to balance across the remaining steel tethers", stat: "wis", r: 1, res: "Patiently matching your center of gravity to the canyon gusts, you safely steady yourself to the other side.", failRes: "A sudden cross-canyon gust catches your balance completely unawares. You tilt violently sideways, barely clinging to the line as you pull yourself to safety." }

                      o: [
                          { text: "👁️ [Wisdom Check] Calmly analyze the crowd density vectors to lead a peaceful negotiation bypass", stat: "wis", r: 1, res: "Your focus convinces the watch lieutenant. The side locks disengage and the ironwood gate slides open.", failRes: "The gate watch ignores your shouts over the roar of the mob. You are pushed back into the crowd friction lines, losing group coordination." },
                          { text: "💪 [Strength Check] Ram your full weight directly into the wood frame to force the locked gear lines", stat: "str", r: 0, res: "Your physical mass snaps the secondary latch bracket, forcing the tracking gate slightly open.", failRes: "The reinforced ironwood doesn't budge an inch. The impact heavily rattles your ribs, leaving you coughing in front of the laughing crowd." },
                          { text: "👟 [Dexterity Check] Weave smoothly through the chaotic cracks in the crowd layout undetected", stat: "dex", r: 1, res: "Slipping through blind spots like a ghost, you reach the side entry port before the mob notices.", failRes: "A burly mercenary steps directly into your path line. You collide heavily, drawing aggressive shouting that breaks your stealth cover completely." }
                      ]},
                    { t: "Deep inside a corrupt local merchant warehouse, you locate an iron chest trapped with an active explosive fire-rune sigil.",
                      o: [
                          { text: "📜 [Intelligence Check] Apply your mana knowledge to delicately unweave the core runic parameters", stat: "int", r: 1, res: "You trace the energy lines, cleanly shorting out the explosive catalyst to reveal the contents.", failRes: "A miniature mana backlash sparks off the lock. The minor surge minorly singes your eyebrows, locking the container tight." },

            3: {

                obstacles: [
                    { t: "An unstable arcane font hums inside a dark cavern fissure, leaking volatile raw elemental magic across the path.",
                      o: [
                          { text: "📜 [Intelligence Check] Focus your mana paths to trace a counter-containment sigil seal", stat: "int", r: 1, res: "Your structural calculation stabilizes the font drift, grounding the elements and clearing the road.", failRes: "Your counter-seal pattern collapses under the pressure. A minor shockwave knocks you back, scraping your knuckles against the granite walls." },
                          { text: "👟 [Dexterity Check] Timing your breathing, try to delicately dodge past the energy pulses", stat: "dex", r: 0, res: "Moving with absolute physical precision, you slide past the crack without absorbing a single bolt.", failRes: "You mistime the visual cycle. An electrical arc clips your shoulder armor, making your limbs feel completely numb for several seconds." },
                          { text: "👁️ [Wisdom Check] Patiently track the visual flare patterns to wait out the active bursts", stat: "wis", r: 1, res: "By analyzing the cycle timing, you lead the group through during a perfect millisecond lull.", failRes: "You miscalculate the ambient delay. A bright flare momentarily flashes your eyes, forcing you to grope blindly forward." }

                ],

            4: {
                name: "Act IV: The Shattered Citadel",
                obstacles: [
                    { t: "A heavily armored Citadel Sentinel commander stands watch over the lower barracks armory tunnel.",
                      o: [

                          { text: "💪 [Strength Check] Intercept his guard line with a crushing, high-impact shoulder block tackle", stat: "str", r: 0, res: "You launch them back into the weapon ironwork racks, disrupting the sector alerts.", failRes: "You crash into him like a stone wall. His heavy plate absorbs the velocity completely, leaving you winded as he shifts into a combat stance." },
                          { text: "📜 [Intelligence Check] Decipher the wall console arrays nearby to activate a structural sorting lock gate behind him", stat: "int", r: 1, res: "A metal divider slams down from the ceiling, isolating the guard cleanly on the far flank loop.", failRes: "The rusted console circuits spark and short out under your touch. The backup deadbolts lock down, forcing a manual fight layout." }
                      ]},
                    { t: "A collapsing courtyard stone bridge threatens to slide into the mountain gorge under heavy artillery fire.",
                      o: [
                          { text: "👁️ [Wisdom Check] Track the mortar fire trajectories to execute a timed dash sequence", stat: "wis", r: 1, res: "You lead a clean tactical sprint across the shaking stones right as an explosive shell crashes behind you.", failRes: "A near-miss shockwave blows you off your feet. You hit the concrete hard, losing valuable momentum as masonry breaks loose." },
                          { text: "💪 [Strength Check] Brace a falling stone structural pillar to hold the archways up for the party", stat: "str", r: 2, res: "Your muscles lock under the concrete stress, maintaining the path long enough for everyone to slide through.", failRes: "The structural weight collapses too fast. The block slips from your grip, grazing your calf as you throw yourself clear of the fall lines." },
                          { text: "👟 [Dexterity Check] Fluidly balance across the breaking ledge frames as the foundations tilt", stat: "dex", r: 1, res: "You adapt to the dropping centers of mass, diving safely onto the solid cliff road.", failRes: "You misjudge a shifting stone vector. Your left boot catches a dropping block, leaving you dangling by your fingertips until you pull up." }
                      ]}
                ],
                combats: ["an elite crimson Wyvern diving from the spiked battlements", "a squad of dark spell-swords wielding high-voltage lightning blades"]
            },
            5: {
                name: "Act V: The Obsidian Apex",
                obstacles: [
                    { t: "The palace inner sanctum door is bound by an ancient blood-magic seal that turns skin to ash upon proximity.",
                      o: [
                          { text: "📜 [Intelligence Check] Execute a core algorithmic rewrite of the runic matrix coordinates", stat: "int", r: 1, res: "Line by line, the glowing crimson blood circle dims out, causing the grand throne doors to click open.", failRes: "The runic layers shift layout mid-cast. A severe mental drain spike strains your concentration, leaving you temporarily disoriented." },
                          { text: "💪 [Strength Check] Execute an absolute physical shield rush combo to shatter the iron hinges", stat: "str", r: 0, res: "Your physical leverage breaks the reinforced bindings, splintering the frame through raw mass.", failRes: "The massive iron reinforcements deflect your speed entirely. The feedback jar rattles your arms up to the shoulders, leaving the seal intact." },
                          { text: "👁️ [Wisdom Check] Focus your defensive energies to project a baseline barrier field over the seal path", stat: "wis", r: 1, res: "The elementally balanced shield acts as an insulation layer, letting you turn the physical lock safely.", failRes: "Your protective energy field flickers out too early. A minor heat flare singes your gauntlets, forcing you back to square one." }

        };

        // NEW: Fully unique Campfire Milestone Registry database
        const campfireDatabase = {
            10: {
                desc: "The deep woods are dead silent save for the crackle of your small fire. You're trying to figure out how a modern phone links to a world of real magic. Sitting across from you on a fallen pine trunk, your companion breaks a dry travel biscuit. \"You look completely out of place staring at that glowing mirror box. Tell me the truth... where did you actually come from? No more fairy tales.\"",
                options: [
                    { text: "👁️ [Wisdom Check] Honestly detail the structure of Earth, describing its lack of magic with vulnerable detail", stat: "wis", romance: 2, 
                      textOutcome: "They study your eyes intently as you speak of skyscrapers and digital webs. Sensing no deceit, they nod softly. 'A strange, lonely-sounding world. But it explains why you view our sky with such wonder.'",
                      failRes: "Your explanation sounds wildly absurd and hard to trace. They narrow their eyes, sighing. 'A world of metal towers and glass mirrors? You are a terrible liar, traveler. Keep your secrets if you must.'" }
                ]
            },
            20: {
                desc: "Perched on a high ridge overlooking the winding low valley, the crisp mountain air cuts cold. Your companion looks back down toward the faint, glowing lamps of the towns below. \"We cross into the Borderlands tomorrow. The guild stakes are high, and the contracts get bloody. When this crisis settles... do you intend to run back to that metal world of yours, or make a home here?\"",
                options: [
                    { text: "👁️ [Wisdom Response] \"My home is right here next to you now. I'm staying.\"", stat: "wis", romance: 3, 
                      textOutcome: "A beautiful smile crosses their face in the warm firelight. They reach out, squeezing your hand with absolute devotion. 'Then I will make sure we both survive to build it.'",

            },

                desc: "You've slipped out onto the secluded stone balcony of the Borderlands Guild quarters, leaving behind the rowdy tavern songs of the mercenary crews below. Your companion leans against the heavy stone railing, staring into the dark tree lines. \"Everyone in that hall wants a piece of our reputation. They view us as weapons, not people. Do you ever feel like the expectations of this plane are choking you?\"",
                options: [
                    { text: "👁️ [Wisdom Check] Calmly articulate that you only focus on protecting the person standing right next to you", stat: "wis", romance: 2, 
                      textOutcome: "They glance sideways at you, a soft look replacing their usual tense guard. 'You have a strange way of making an entire world feel small and simple, traveler. Thank you.'",
                      failRes: "Your reassurance feels dismissive. They shake their head, adjusting their gauntlets. 'Easy to say when it isn't your homeland line on the breaking block. Let's just get some rest.'" }
                ]
            },
            40: {
                desc: "Huddled inside a half-collapsed stone watchtower on the High Moor, you use a scrap of linen to gently dab a minor armor scrape on your companion's forearm. They wince slightly but don't pull away. \"The descent into the shadow cracks tomorrow is an absolute one-way trek. If things go dark down there... promise me you'll use that glowing device to save yourself, even if it means leaving me behind.\"",
                options: [
                    { text: "👁️ [Wisdom Check] Firmly tie the bandage knot, refusing the premise with quiet resolve", stat: "wis", romance: 3, 
                      textOutcome: "You look up, locking eyes. 'We leave together or we don't leave at all.' They stare for a long second, then let out a breath, a deep warmth settling over their posture. 'Foolish. But I'm glad to hear it.'",
                      failRes: "Your hand slips slightly on the linen knot, causing them to wince and pull back. 'You hesitate. Don't let your sentimentality get us both killed in the dark pools. Let's set the watch rotations.'" }
                ]
            },
            50: {
                desc: "Deep inside the humid cavern layout, the air is thick with trace minerals. Your companion unbuckles their shoulder guards, completely exhausted. \"I never believed the old archival rifts about extra-planar entities. I thought anything from outside our plane would be a monster. But you... you're just a person. A person I've grown to depend on completely.\"",
                options: [
                    { text: "👁️ [Wisdom Check] Lean in closer, sharing a quiet, mutual moment of grounding peace", stat: "wis", romance: 2, 
                      textOutcome: "You rest your shoulder against theirs. They lay their head down, closing their eyes in total comfort. 'Don't let the fire fade out tonight, traveler. I feel safe when you're awake.'",

                ]
            },
            60: {
                desc: "The camp fire is down to low blue embers inside the sunken archives vault. The weight of the ancient books around you is heavy. Your companion looks at a cracked stone mural of the Obsidian Apex. \"The dark spell lines are fracturing our world. I can feel the feedback in my marrow. If we fail at the summit, everything I am is ash. What happens to you if this realm breaks?\"",
                options: [
                    { text: "👁️ [Wisdom Check] State that your timeline is permanently bound to this realm's survival now", stat: "wis", romance: 2, 
                      textOutcome: "They reach out, tracing the edge of your gauntlet. 'Then we carry the exact same destiny. Let's make the Demon Lord regret anchoring into our generation.'",
                      failRes: "You stumble through a technical explanation of your phone's safety backup loops. They sigh, looking lonely. 'So you always have a trapdoor out. Must be nice to have options.'" }
                ]
            },
            70: {
                desc: "Huddled under a temporary hide shelter on the freezing slopes of the Shattered Citadel, snow beats hard against the canvas frames. You're sharing a single wool blanket, your breath pluming white in the air. \"I used to fight purely out of spite for the rifts,\" they whisper, shivering slightly. \"But now... I find myself fighting just to see what a quiet spring morning looks like with you. Is that pathetic?\"",
                options: [
                    { text: "👁️ [Wisdom Check] Wrap the blanket tighter around them, offering a genuine, heartfelt promise for that spring morning", stat: "wis", romance: 3, 
                      textOutcome: "They lean heavily into your chest, their shivering slowing down as they melt into your warmth. 'Hold me to that promise, traveler. Don't let me forget how the sun feels.'",

                ]
            },
            80: {
                desc: "The camp fire is just a glowing crack in the black ice of the final mountain plateau. The sky above is twisted into chaotic purple matrix spirals. Your companion looks at their blade, then back at you. \"The final gate is within walking distance. Tomorrow, we either save this world or die in the attempt. I need to hear it one last time before the ash clears... do you love me?\"",
                options: [
                    { text: "👁️ [Wisdom Response] Pull them into a fierce, absolute embrace and state your devotion clearly", stat: "wis", romance: 4, 
                      textOutcome: "They wrap their arms around your neck, kissing you with fierce, desperate passion amid the howling winds. 'Then let the Apex fall. I am ready for anything by your side.'",
                      failRes: "You freeze up, choked by the gravity of the looming final battle layout. They look down at their blade, a lonely but resigned smile on their face. 'I understand. Keep your mind on the target lines tomorrow.'" }
                ]
            },
            90: {
                desc: "You are camping on the literal threshold stone of the Obsidian Apex room. The air smells of sulfur and ozone. Your phone screen flashes continuously with high-voltage warning patterns—the gate to Earth is fully active and pulling your signal. Your companion watches the screen flicker. \"Your gateway home is singing to you. It knows you're close to the end. Are you scared of what happens when you have to choose?\"",

                    { text: "👁️ [Wisdom Check] Reassure them that your choices were decided the day you met them in the woods", stat: "wis", romance: 3, 
                      textOutcome: "They rest their forehead against yours, taking a deep, steadying breath. 'Then let the rifts collapse. We face the throne lord together.'",

        function checkExistingSave() {
            const localData = localStorage.getItem('isekai_chronicles_save');
            return localData ? JSON.parse(localData) : null;
        }

        function isMainStat(stat) {
            const type = gameState.subType;
            if (type === 'Knight') return (stat === 'str' || stat === 'dex');
            if (type === 'Summoner') return (stat === 'int' || stat === 'wis');
            if (type === 'Ranger') return (stat === 'dex' || stat === 'wis');
            if (type === 'Assassin') return (stat === 'dex' || stat === 'int');
            return false;
        }

        function getTargetDC(ch) {
            if (ch <= 20) return 13;   
            if (ch <= 40) return 16;   
            if (ch <= 60) return 20;   
            if (ch <= 80) return 22;   
            return 27;                 
        }

        function updateHUD() {
            const ch = gameState.currentChapter;
            if (ch <= 20) hudAct.innerText = "Act I: The Awakening";
            else if (ch <= 40) hudAct.innerText = "Act II: Borderlands Guild";
            else if (ch <= 60) hudAct.innerText = "Act III: Shadow Descent";
            else if (ch <= 80) hudAct.innerText = "Act IV: Shattered Citadel";
            else hudAct.innerText = "Act V: Obsidian Apex";

            if (gameState.name) {
                hud.classList.remove('hidden');
                document.getElementById('hud-name').innerText = `${gameState.name} (${gameState.subType})`;
                document.getElementById('hud-chapter').innerText = `Ch ${ch}/100`;
            } else {
                hud.classList.add('hidden');
            }
        }

        function recompileSaveState() {
            localStorage.setItem('isekai_chronicles_save', JSON.stringify(gameState));
        }

        function getRomancePartner() {
            const pref = gameState.partnerPref;
            if (pref === 'Female') return { name: 'Lyra', role: 'the Fierce Elven Ranger' };
            if (pref === 'Male') return { name: 'Garrick', role: 'the Charming Vanguard Knight' };
            return { name: 'Eldrin', role: 'the Rogue High Elf Mage' }; 
        }

        function getActiveActTheme(ch) {
            if (ch <= 20) return actThemes[1];
            if (ch <= 40) return actThemes[2];
            if (ch <= 60) return actThemes[3];
            if (ch <= 80) return actThemes[4];
            return actThemes[5];
        }

        function getChapterData(ch, partner) {
            const currentAct = getActiveActTheme(ch);
            
            const standardCombatOptions = [
                { text: "⚔️ [Dexterity Check] Coordinate a swift flanking assault combo", stat: "dex", romance: 1, textOutcome: "You time your advance perfectly, flashing past the target's armor line to expose a clean opening.", failRes: "Your timing window shifts slightly out of sync. You miss the precise strike angle, taking a minor shield deflection clip." },
                { text: "🛡️ [Strength Check] Dig your boots in and draw the combat pressure onto your stance", stat: "str", romance: 0, textOutcome: "You slam your weapon against your armor, forcing the enemy focus entirely onto your defensive position.", failRes: "Your footing slides out on the loose topsoil. The impact breaks your primary posture frame, shaking your layout slightly." },
                { text: "🏃 [Wisdom Check] Pull back into the immediate brush to target a vulnerability", stat: "wis", romance: 1, textOutcome: "You duck behind cover, locating a major tactical exploit path to call out to your partner.", failRes: "You trip over a low ground root while diving for cover. The sudden noisy rustle exposes your position cleanly." },
                { text: "📜 [Intelligence Check] Analyze the target’s attack cycles to spot an environmental vulnerability", stat: "int", romance: 1, textOutcome: "You precisely call out a timing lag in the enemy line, letting your partner land a clean exploit hit.", failRes: "You over-analyze the trajectory maps, completely missing a swift flanking strike that catches your shoulder plate." }
            ];

            if (ch === 1) {
                return {
                    desc: `You gasp for air, collapsing onto a bed of damp earth and pine needles. The blinding light of an intricate summoning circle fades on the ground beneath you. Your head throbs, and your clothes are completely out of place here. Reaching into your pocket, you pull out your Earth cell phone—there is zero service, but its offline screen flickers to life, strangely vibrating in sync with the ambient energy. As you stand up trying to process your new body's **${gameState.subType}** abilities, a branch snaps. ${partner.name}, ${partner.role}, drops from the canopy above with a weapon drawn. "State your name and business, traveler! I saw the summoning rift from the valley!"`,
                    options: [
                        { text: "👁️ [Wisdom Check] Lower your hands slowly and articulate a calm explanation string", stat: "wis", romance: 1, textOutcome: "Your honest posture puts them at ease. Lowering the weapon, they listen to your bizarre tale with deep curiosity.", failRes: "Your voice cracks heavily under the stress of the portal shift. You sound highly erratic, causing them to keep their blade edge leveled right at your throat." },
                        { text: "💪 [Strength Check] Brace your balance profile and prepare for an immediate martial exchange", stat: "str", romance: 0, textOutcome: "Steel meets steel with a violent ring! The physical trade tests your baseline muscle groups, earning a nod of respect.", failRes: "You swing wildly with your unfamiliar limbs. They effortlessly parry your balance vector away, pinning you into the dirt within seconds." }
                    ]
                };
            }
            
            if (ch === 2) {
                return {
                    desc: `Leaving the glowing ash of the summoning site behind, you sprint alongside ${partner.name}. The canopy overhead slams shut, casting the forest into deep twilight. Suddenly, the path ends at a massive briar patch tangled with thick, glowing purple thorns that hum with trace amounts of poison mana. You have to pass.`,
                    options: [
                        { text: "🍎 [Wisdom Check] Feed nearby berries to local wildlife to clear a crawling path", stat: "wis", romance: 1, textOutcome: "The critters pack together, chewing rapidly through the root systems to clear a narrow crawling gap for you.", failRes: "The wild rodents ignore the berries completely, startled by your jerky movements. They hiss loudly, biting your gloves as you fall back." },
                        { text: "👟 [Dexterity Check] Use nearby low boulders to vault cleanly over the wall", stat: "dex", romance: 0, textOutcome: "You execute a clean aerial leap, clearing the thorns completely and landing safely on the opposite path.", failRes: "Your heel catches the very top vine loop. You clear the main patch but drop heavily onto your chest on the far gravel trail." }
                    ]
                };
            }
            
            if (ch === 3) {
                return {
                    desc: `Breaching the thickets, the path breaks into a rocky, uphill ravine. The sound of snarling echoes from the dense trees to your left. A hunting pack of feral dire-wolves sweeps down from the ridge line, red eyes locked onto your strange planar scent!`,
                    options: standardCombatOptions
                };
            }
            
            if (ch === 4) {
                return {
                    desc: `With the wolves scattered, you push higher up the ridge line. The path turns treacherous as you reach a broken wooden suspension bridge spanning a yawning canyon gap. The support ropes are frayed to the final thread, swaying over an absolute drop.`,
                    options: [
                        { text: "🔍 [Intelligence Check] Analyze the line stress to step precisely on support joints", stat: "int", romance: 1, textOutcome: "You map out a safe stepping route, navigating the swaying structure safely.", failRes: "Your step triggers a rotted seam. A board breaks clean away under your foot, leaving you dangling by your elbows until hauled up." },
                        { text: "🏃 [Dexterity Check] Sprint across at top speed before the planks can detach", stat: "dex", romance: 0, textOutcome: "You sprint hard. Planks splinter into the abyss behind your boots, but your forward momentum carries you across.", failRes: "You slip on a mossy support knot halfway across. You slide rough along the main hemp line, scraping your arms before scrambling across." }
                    ]
                };
            }
            
            if (ch === 5) {
                return {
                    desc: `Safely across the canyon, the trail dips down into a dense, muddy marshland. Deep bubbles gurgle in the black mire nearby. Without warning, a towering swamp horror—a mass of rotted roots and glowing eyes—surges out of the mud!`,
                    options: standardCombatOptions
                };
            }

            if (ch === 99) {
                return {
                    desc: `The High Demon Lord crashes to the floor, turning to ash! However, his dying curse triggers a catastrophic structural collapse of the obsidian throne room. A massive falling stone column is plummeting straight toward an unconscious, exhausted ${partner.name}! Simultaneously, your phone flashes with a blinding portal signal—your one chance to warp safely back to Earth is active right now.`,
                    options: [
                        { text: "💪 [Strength Sacrifice Check] Dive over their frame, lock your shields, and fully tank the falling debris!", stat: "str", romance: 10, textOutcome: "Without a single thought for yourself, you shield them. The masonry smashes down, shattering your armor but keeping them completely untouched.", failRes: "You aren't fast enough to absorb the absolute load cleanly. The collision clips you hard, bruising your side deeply as you tumble away together." },
                        { text: "👟 [Dexterity Evade Check] Grab them by the pack and execute a frantic rolling slide toward the exit archways", stat: "dex", romance: 0, textOutcome: "You haul their weight across the tiling just as the column crashes onto the exact space you occupied a second prior.", failRes: "You lose your footing on the slick obsidian tiles while hauling their frame. The falling stone clips your packs, throwing you both down hard." },
                        { text: "📜 [Intelligence Escape Check] Abandon the realm and dive directly into the phone portal to secure your escape home", stat: "int", romance: -5, textOutcome: "Driven by survival instinct, you leap into the light. The dimensional gate snaps shut, leaving the fantasy world behind forever.", failRes: "The portal destabilizes right as you reach the threshold. The magical feedback snaps back, knocking you unconscious inside the falling debris field." }
                    ]
                };
            }

            if (ch === 100) {
                return {
                    desc: `The cataclysm settles completely. The dust clears over the ruined throne room floor. The dark rifts are silent, and the realm has been decisively saved. Standing among the remnants of the final battle line, you turn toward ${partner.name} to face the final calculation of your timeline journey.`,
                    options: [{ text: "🌌 Complete the parameters and witness your final fate.", stat: "int", romance: 0, textOutcome: "The timeline calculations compile..." }]
                };
            }

            // BUG FIXED: Dynamic Campfire Router loads distinct scene block objects based on exact chapter keys
            if (ch % 10 === 0) {
                const campfireScene = campfireDatabase[ch];
                if (campfireScene) {
                    return {
                        desc: campfireScene.desc,
                        options: campfireScene.options
                    };
                }
            }

            const isExploration = (ch % 2 === 0);
            const dataIndex = Math.floor(ch / 2) % currentAct.obstacles.length;
            
            if (isExploration) {
                const obs = currentAct.obstacles[dataIndex];
                return {
                    desc: `Pressing forward, the environment shifts dramatically around you. <br><br><span class='text-white font-semibold'>Current Roadblock:</span> ${obs.t}`,
                    options: obs.o.map(opt => ({ text: opt.text, stat: opt.stat, romance: opt.r, textOutcome: opt.res, failRes: opt.failRes }))
                };
            } else {
                const combatText = currentAct.combats[ch % currentAct.combats.length];
                return {
                    desc: `Danger spikes instantly! Ahead, **${combatText}** surges forward out of the shadows with weapons drawn! ${partner.name} draws steel, backing up your line!`,
                    options: standardCombatOptions
                };
            }
        }

        function initMainMenu() {
            updateHUD();
            const savedState = checkExistingSave();
            let resumeButtonHTML = "";
            
            if (savedState && savedState.currentChapter > 1 && savedState.currentChapter <= 100) {
                resumeButtonHTML = `
                    <button onclick="resumeSavedGame()" class="w-full py-4 px-6 bg-amber-600 hover:bg-amber-500 text-white font-bold rounded-xl transition-all border border-amber-500/30 active:scale-95 flex justify-between items-center shadow-lg shadow-amber-900/20">
                        <span>📜 Resume Journey</span>
                        <span class="text-xs bg-amber-950/50 px-2 py-1 rounded">Ch ${savedState.currentChapter}</span>
                    </button>
                `;
            }

            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-center space-y-6">
                    <div class="text-center space-y-2">
                        <h2 class="text-3xl font-bold text-white tracking-tight">Isekai Realms</h2>
                        <p class="text-slate-400 text-sm">Cross the dimensional gate into the D&D ruleset.</p>
                    </div>
                    <div class="flex flex-col space-y-3">
                        ${resumeButtonHTML}
                        <button onclick="initClassScreen()" class="w-full py-4 px-6 bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-center rounded-xl transition-all border border-indigo-500/30 active:scale-95 shadow-lg shadow-indigo-900/20">
                            ✨ Begin New Awakening
                        </button>
                    </div>
                </div>
            `;
        }

        function resumeSavedGame() {
            const savedState = checkExistingSave();
            if (savedState) {
                gameState = savedState;
                updateHUD();
                renderStoryLoop();
            }
        }

        function initClassScreen() {
            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-center space-y-6">
                    <div class="text-center space-y-2">
                        <h2 class="text-2xl font-bold text-white">Select Your Class</h2>
                        <p class="text-slate-400 text-sm">Your physical awakening ruleset inside the magical plane.</p>
                    </div>
                    <div class="flex flex-col space-y-3">
                        <button onclick="selectClass('Summoner')" class="w-full py-4 px-6 bg-indigo-950 hover:bg-indigo-900 text-left font-semibold text-white rounded-xl transition-all border border-indigo-500/30 active:scale-95 flex justify-between items-center">
                            <span>🔮 Summoner</span> <span class="text-xs text-indigo-400">INT & WIS Focus</span>
                        </button>
                        <button onclick="selectClass('Ranger')" class="w-full py-4 px-6 bg-emerald-950 hover:bg-emerald-900 text-left font-semibold text-white rounded-xl transition-all border border-emerald-500/30 active:scale-95 flex justify-between items-center">
                            <span>🏹 Ranger</span> <span class="text-xs text-emerald-400">DEX & WIS Focus</span>
                        </button>
                        <button onclick="selectClass('Assassin')" class="w-full py-4 px-6 bg-rose-950 hover:bg-rose-900 text-left font-semibold text-white rounded-xl transition-all border border-rose-500/30 active:scale-95 flex justify-between items-center">
                            <span>🗡️ Assassin</span> <span class="text-xs text-rose-400">DEX & INT Focus</span>
                        </button>
                        <button onclick="selectClass('Knight')" class="w-full py-4 px-6 bg-slate-800 hover:bg-slate-700 text-left font-semibold text-white rounded-xl transition-all border border-slate-600 active:scale-95 flex justify-between items-center">
                            <span>🛡️ Knight</span> <span class="text-xs text-slate-400">STR & DEX Focus</span>
                        </button>
                    </div>
                </div>
            `;
        }

        function selectClass(choice) {
            gameState.subType = choice;
            if (choice === 'Knight') { gameState.stats = { str: 10, dex: 10, int: 5, wis: 5 }; }
            else if (choice === 'Summoner') { gameState.stats = { str: 5, dex: 5, int: 10, wis: 10 }; }
            else if (choice === 'Ranger') { gameState.stats = { str: 5, dex: 10, int: 5, wis: 10 }; }
            else if (choice === 'Assassin') { gameState.stats = { str: 5, dex: 10, int: 10, wis: 5 }; }
            initCharacterCreation();
        }

        function initCharacterCreation() {
            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-center space-y-5">
                    <div class="text-center space-y-1">
                        <h2 class="text-xl font-bold text-white">Identity Awakening</h2>
                        <p class="text-slate-400 text-sm">Etch your parameters into the tapestry.</p>
                    </div>
                    <div class="space-y-1">
                        <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase">True Name</label>
                        <input id="char-name" type="text" placeholder="Enter name..." class="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-xl text-white font-medium focus:outline-none focus:border-indigo-500 text-base">
                    </div>
                    <div class="space-y-1">
                        <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase">Are you Male, Female, or Non-Binary?</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setStateVar(this, 'gender', 'Male', 'g-btn')" class="g-btn py-2.5 bg-slate-800 text-xs text-slate-300 rounded-xl border border-slate-700 font-medium transition-all">Male</button>
                            <button onclick="setStateVar(this, 'gender', 'Female', 'g-btn')" class="g-btn py-2.5 bg-slate-800 text-xs text-slate-300 rounded-xl border border-slate-700 font-medium transition-all">Female</button>
                            <button onclick="setStateVar(this, 'gender', 'Non-Binary', 'g-btn')" class="g-btn py-2.5 bg-slate-800 text-xs text-slate-300 rounded-xl border border-slate-700 font-medium transition-all">Non-Binary</button>
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase">Who catches your eye in this realm?</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setStateVar(this, 'partnerPref', 'Female', 'p-btn')" class="p-btn py-2.5 bg-slate-800 text-xs text-slate-300 rounded-xl border border-slate-700 font-medium transition-all">Women</button>
                            <button onclick="setStateVar(this, 'partnerPref', 'Male', 'p-btn')" class="p-btn py-2.5 bg-slate-800 text-xs text-slate-300 rounded-xl border border-slate-700 font-medium transition-all">Men</button>
                            <button onclick="setStateVar(this, 'partnerPref', 'Non-Binary', 'p-btn')" class="p-btn py-2.5 bg-slate-800 text-xs text-slate-300 rounded-xl border border-slate-700 font-medium transition-all">Fluid</button>
                        </div>
                    </div>
                    <button onclick="submitCharacter()" class="w-full mt-2 py-3.5 bg-indigo-600 hover:bg-indigo-500 font-bold text-white rounded-xl active:scale-95 transition-all shadow-lg shadow-indigo-900/20">
                        Cross the Threshold ⚡
                    </button>
                </div>
            `;
        }

        function setStateVar(btnElement, variable, value, groupClass) {
            document.querySelectorAll('.' + groupClass).forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-500');
                btn.classList.add('bg-slate-800', 'text-slate-300', 'border-slate-700');
            });
            btnElement.classList.remove('bg-slate-800', 'text-slate-300', 'border-slate-700');
            btnElement.classList.add('bg-indigo-600', 'text-white', 'border-indigo-500');
            gameState[variable] = value;
        }

        function submitCharacter() {
            const inputName = document.getElementById('char-name').value.trim();
            if (!inputName) return alert('A name is strictly required.');
            if (!gameState.gender) return alert('Please select your identity profile.');
            if (!gameState.partnerPref) return alert('Please select your companion preference.');
            gameState.name = inputName;
            
            localStorage.removeItem('isekai_chronicles_save');
            updateHUD();
            renderStoryLoop();
        }

        function handleDiceRoll(actionTaken, outcomeText, statType, scoreMod, customFailText = "") {
            const dieRoll = Math.floor(Math.random() * 20) + 1; 
            const playerStatValue = gameState.stats[statType] || 10;
            const targetDC = getTargetDC(gameState.currentChapter);
            
            const checkTotal = dieRoll + playerStatValue;
            const isSuccess = (checkTotal >= targetDC);

            let resultTitle = "";
            let resultBody = "";
            let finalAffinityMod = scoreMod;

            if (isSuccess) {
                resultTitle = `<span class="text-emerald-400 font-bold">🎯 CHECK SUCCESS (Rolled ${dieRoll} + Stat ${playerStatValue} = ${checkTotal} vs DC ${targetDC})</span>`;
                resultBody = outcomeText;
            } else {
                resultTitle = `<span class="text-rose-400 font-bold">❌ CHECK FAILURE (Rolled ${dieRoll} + Stat ${playerStatValue} = ${checkTotal} vs DC ${targetDC})</span>`;
                
                if (customFailText && customFailText !== "undefined" && customFailText !== "") {
                    resultBody = customFailText;
                } else {
                    resultBody = `Your timing falters under stress. You clear the encounter clumsily, but your tactical failure leaves your partner exposed to structural danger.`;
                }
                finalAffinityMod = -1; 
            }

            gameState.romanceScore += finalAffinityMod;
            let affinityIconHTML = `<span>⚖️ Affinity Unchanged</span>`;
            if (finalAffinityMod > 0) affinityIconHTML = `<span class="text-emerald-400 font-semibold">💘 Affinity Increased (+${finalAffinityMod})</span>`;
            if (finalAffinityMod < 0) affinityIconHTML = `<span class="text-rose-400 font-semibold">💔 Affinity Decreased (${finalAffinityMod})</span>`;

            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-between h-full">
                    <div class="flex-1 overflow-y-auto space-y-4">
                        <div class="bg-slate-950 p-4 border border-slate-800 rounded-xl space-y-1">
                            <span class="text-[10px] font-mono tracking-wider text-indigo-400 uppercase block font-bold">${resultTitle}</span>
                            <p class="text-xs text-slate-400 italic">${actionTaken}</p>
                        </div>
                        <div class="space-y-2 pt-2">
                            <span class="text-[10px] font-mono tracking-wider text-amber-400 uppercase block font-bold">Result Outcome</span>
                            <p class="text-slate-200 leading-relaxed text-sm">${resultBody}</p>
                        </div>
                    </div>
                    <div class="space-y-4 pt-4 border-t border-slate-800 shrink-0 bg-slate-900">
                        <div class="text-center text-xs">
                            ${affinityIconHTML}
                        </div>
                        <button onclick="processChapterProgression()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl active:scale-95 transition-all text-center flex justify-center items-center space-x-2 shadow-lg shadow-indigo-900/20">
                            <span>Advance Journey</span>
                            <span class="font-mono text-sm">▶</span>
                        </button>
                    </div>
                </div>
            `;
        }

        function processChapterProgression() {
            const ch = gameState.currentChapter;
            if (ch === 20 || ch === 40 || ch === 60 || ch === 80) {
                renderBonusStatScreen();
            } else {
                advanceChapterSequence();
            }
        }

        function renderBonusStatScreen() {
            updateHUD();
            
            const statButtons = ['str', 'dex', 'int', 'wis'].map(s => {
                const mainLabel = isMainStat(s) ? "<span class='text-[9px] bg-indigo-950 text-indigo-400 px-1.5 py-0.5 rounded ml-2 font-bold'>MAIN</span>" : "";
                const buttonDisabled = isMainStat(s) ? "disabled class='w-full py-3 px-4 bg-slate-950 text-slate-600 border border-slate-900 text-left rounded-xl flex justify-between items-center cursor-not-allowed'" : `onclick="applyBonusStatPoint('${s}')" class="w-full py-3 px-4 bg-amber-950/40 hover:bg-amber-900/60 border border-amber-500/30 hover:border-amber-400 text-left text-amber-100 font-medium rounded-xl transition-all flex justify-between items-center active:scale-98"`;
                
                return `
                    <button ${buttonDisabled}>
                        <span class="text-xs font-semibold tracking-wider uppercase font-mono">${s === 'str' ? '💪 Strength' : s === 'dex' ? '👟 Dexterity' : s === 'int' ? '📜 Intelligence' : '👁️ Wisdom'} (Current: ${gameState.stats[s]})</span>
                        ${mainLabel || "<span class='text-xs text-amber-400 font-bold'>+2 Points ▶</span>"}
                    </button>
                `;
            }).join('');

            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-center space-y-5">
                    <div class="text-center space-y-1">
                        <span class="text-xs bg-amber-500/20 text-amber-400 px-2.5 py-1 rounded-full font-mono font-bold tracking-wider uppercase">Act Milestone Conquered</span>
                        <h2 class="text-xl font-bold text-white pt-2">Versatility Attribute Training</h2>
                        <p class="text-slate-400 text-sm leading-relaxed">You have hit an Act threshold. Allocate <span class="text-amber-400 font-bold font-mono">+2 Bonus Points</span> to a non-primary attribute to bolster your saving throws.</p>
                    </div>
                    <div class="flex flex-col space-y-2.5">
                        ${statButtons}
                    </div>
                </div>
            `;
        }

        function applyBonusStatPoint(targetStat) {
            gameState.stats[targetStat] += 2;
            advanceChapterSequence();
        }

        function advanceChapterSequence() {
            if (gameState.currentChapter === 100) {
                renderEndGameScreen();
            } else {
                gameState.currentChapter++;
                const ch = gameState.currentChapter;
                
                if (ch === 21 || ch === 41 || ch === 61 || ch === 81) {
                    for (let s in gameState.stats) {
                        gameState.stats[s] += isMainStat(s) ? 4 : 2;
                    }
                }

                recompileSaveState();
                renderStoryLoop();
            }
        }

        function renderStoryLoop() {
            updateHUD();
            const partner = getRomancePartner();
            const ch = gameState.currentChapter;
            const chData = getChapterData(ch, partner);
            let choices = [...chData.options];

            const runtimeDescriptionText = `
                <div class="space-y-3">
                    <p class="text-slate-300 leading-relaxed font-normal">${chData.desc}</p>
                </div>
                <div class="mt-4 pt-3 border-t border-slate-800/60 grid grid-cols-4 gap-1 text-[10px] font-mono text-center text-slate-400 bg-slate-950/40 p-2 rounded-xl">
                    <div>💪 STR: <span class="text-white font-bold">${gameState.stats.str}</span></div>
                    <div>👟 DEX: <span class="text-white font-bold">${gameState.stats.dex}</span></div>
                    <div>📜 INT: <span class="text-white font-bold">${gameState.stats.int}</span></div>
                    <div>👁️ WIS: <span class="text-white font-bold">${gameState.stats.wis}</span></div>
                </div>
                <div class="mt-2 flex justify-between text-[11px] text-slate-500 font-mono">
                    <span>📱 PHONE: ${(100 - (ch * 0.4)).toFixed(0)}%</span>
                    <span>💘 AFFINITY: ${gameState.romanceScore}</span>
                </div>
            `;

            const buttonsHTML = choices.map(choice => {
                const escapedOutcome = choice.textOutcome.replace(/"/g, '&quot;').replace(/'/g, "\\'");
                const escapedAction = choice.text.replace(/"/g, '&quot;').replace(/'/g, "\\'");
                const escapedFail = (choice.failRes || "").replace(/"/g, '&quot;').replace(/'/g, "\\'");
                
                return `
                    <button onclick="handleDiceRoll('${escapedAction}', '${escapedOutcome}', '${choice.stat}', ${choice.romance || 0}, '${escapedFail}')" class="w-full py-3 px-4 bg-slate-800 hover:bg-slate-700 active:bg-indigo-900 border border-slate-700 hover:border-indigo-500 text-left text-white font-medium rounded-xl transition-all flex items-center space-x-3 group">
                        <span class="flex-1 text-xs md:text-sm leading-snug">${choice.text}</span>
                        <span class="text-slate-500 group-hover:text-indigo-400 text-xs font-bold font-mono shrink-0">🎲</span>
                    </button>
                `;
            }).join('');

            view.innerHTML = `
                <div class="w-full flex-1 flex flex-col justify-between h-full">
                    <div class="flex-1 pr-1 overflow-y-auto space-y-4 mb-4">
                        ${runtimeDescriptionText}
                    </div>
                    <div class="space-y-2 shrink-0 pt-2 bg-slate-900">
                        ${buttonsHTML}
                    </div>
                </div>
            `;
        }

        function renderEndGameScreen() {
            hud.classList.add('hidden');
            let endTitle = "";
            let endBody = "";
            let bgClass = "";
            const partner = getRomancePartner();
            const finalScore = gameState.romanceScore;

            localStorage.removeItem('isekai_chronicles_save');

            if (finalScore >= 30) {
                bgClass = "border-emerald-500/30 bg-emerald-950/20";
                endTitle = "🏆 True Romance Ending: Bond Eternal";
                endBody = `The dark rifts are permanently sealed. Your phone screen goes completely black as its battery drains to zero—but it doesn't matter anymore. Turning your back on Earth entirely, you pull ${partner.name} into a deep kiss as a peaceful new kingdom unfurls before you. Your choices, culminating in a final heroic sacrifice, secured an absolute, legendary lifetime together. Campaign Complete!`;
            } else if (finalScore >= 10 && finalScore < 30) {
                bgClass = "border-cyan-500/30 bg-cyan-950/20";
                endTitle = "⚔️ Vanguard Ending: Solo Legend";
                endBody = `The realm is decisively saved. You choose to remain in this world, rising to prominence as a legendary Grand Champion of the realm. However, your connection with ${partner.name} remained balanced and strictly professional. You walk the battlements as trusted companions-in-arms, sharing mutual respect, but your romantic paths diverge as you rule separately.`;
            } else if (finalScore >= 0 && finalScore < 10) {
                bgClass = "border-amber-500/30 bg-amber-950/20";
                endTitle = "⏳ Lonely Ending: A World Apart";
                endBody = `The world is saved, but your consistent emphasis on returning home created an unbridgeable distance. A final, shimmering rift manifests before you. Without looking back, ${partner.name} leaves for the wild woods. You step through the gate alone, waking up back in your quiet Earth room. All you have left is a dead phone and memories of a magical world that will never see you again.`;
            } else {
                bgClass = "border-rose-500/30 bg-rose-950/20";
                endTitle = "💀 Bad Ending: Broken Lineage";
                endBody = `Your antagonistic decision paths completely fractured your party synergy mechanics. Under the pressure of the final battle, your tactical lines collapsed completely. ${partner.name} fell in battle trying to absorb a blow meant for you, and the unchecked rift overloads, consuming the entire kingdom in an explosion of dark energy. Total timeline failure.`;
            }

            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-center space-y-6">
                    <div class="p-6 border rounded-2xl ${bgClass} space-y-4">
                        <h2 class="text-xl font-bold text-center text-white">${endTitle}</h2>
                        <p class="text-slate-300 text-sm leading-relaxed text-center">${endBody}</p>
                    </div>
                    <div class="space-y-2 text-center text-xs text-slate-500 font-mono">
                        <p>Final Log: ${gameState.name} | ${gameState.subType}</p>
                        <p>Final Affinity Score: [${finalScore}]</p>
                    </div>
                    <button onclick="resetGame()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 font-bold text-white rounded-xl active:scale-95 transition-all">
                        Return to Gate Hub 🔁
                    </button>
                </div>
            `;
        }

        function resetGame() {
            gameState = { subType: '', name: '', gender: '', partnerPref: '', currentChapter: 1, romanceScore: 0, stats: { str: 5, dex: 5, int: 5, wis: 5 } };
            initMainMenu();
        }

        initMainMenu();
    </script>
</body>
</html>
