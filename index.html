<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isekai Chronicles</title>
    <!-- Tailwind CSS for high contrast, clean layout -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            font-size: 16px; /* Strict compliance with UI spec */
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 flex justify-center items-center min-h-screen p-4 select-none">

    <!-- Mobile Screen Frame Container -->
    <div class="w-full max-w-md bg-slate-900 border-2 border-slate-800 rounded-2xl shadow-2xl flex flex-col h-[90vh] overflow-hidden">
        
        <!-- Game Header / HUD -->
        <header class="bg-slate-950 px-6 py-4 border-b border-slate-800 flex justify-between items-center shrink-0">
            <h1 class="text-sm font-bold tracking-widest text-indigo-400 uppercase">Isekai Gateway</h1>
            <div id="hud-stats" class="text-xs text-slate-400 hidden">
                <span id="hud-name" class="font-semibold text-slate-200"></span> | 
                <span id="hud-chapter" class="text-amber-400 font-semibold">Ch 1/20</span>
            </div>
        </header>

        <!-- Dynamic Game Content Viewport -->
        <main id="game-viewport" class="flex-1 overflow-y-auto p-6 flex flex-col justify-between space-y-6">
            <!-- JavaScript dynamically injects active screens here -->
        </main>
        
    </div>

    <script>
        // Global Player State Architecture
        let gameState = {
            genre: '',         // 'Fantasy' | 'Sci-Fi'
            subType: '',       // Class Name or Premise Name
            name: '',
            gender: '',        // 'Male' | 'Female' | 'Non-Binary'
            currentChapter: 1, // 1 to 20
            romanceScore: 0,   // Hidden variable tracking choice affinity
        };

        const view = document.getElementById('game-viewport');
        const hud = document.getElementById('hud-stats');

        // Helper to update the top HUD
        function updateHUD() {
            if (gameState.name) {
                hud.classList.remove('hidden');
                document.getElementById('hud-name').innerText = `${gameState.name} (${gameState.subType})`;
                document.getElementById('hud-chapter').innerText = `Ch ${gameState.currentChapter}/20`;
            } else {
                hud.classList.add('hidden');
            }
        }

        // Phase 1: Genre Selection Screen
        function initGenreScreen() {
            updateHUD();
            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-center space-y-6">
                    <div class="text-center space-y-2">
                        <h2 class="text-2xl font-bold text-white">Choose Your Reality</h2>
                        <p class="text-slate-400 text-sm">Where shall your soul be anchored next?</p>
                    </div>
                    <div class="flex flex-col space-y-3">
                        <button onclick="selectGenre('Fantasy')" class="w-full py-4 px-6 bg-indigo-600 hover:bg-indigo-500 font-semibold text-lg text-white rounded-xl transition-all border border-indigo-500/30 active:scale-95">
                            ✨ Fantasy World
                        </button>
                        <button onclick="selectGenre('Sci-Fi')" class="w-full py-4 px-6 bg-cyan-600 hover:bg-cyan-500 font-semibold text-lg text-white rounded-xl transition-all border border-cyan-500/30 active:scale-95">
                            🚀 Sci-Fi Universe
                        </button>
                    </div>
                </div>
            `;
        }

        function selectGenre(choice) {
            gameState.genre = choice;
            initSubClassScreen();
        }

        // Phase 1.5: Class or Sub-Premise Menu
        function initSubClassScreen() {
            let optionsHTML = '';
            let title = '';
            let desc = '';

            if (gameState.genre === 'Fantasy') {
                title = "Select Your Target Class";
                desc = "Your physical manifestation ruleset inside the magical plane.";
                const classes = ['Summoner', 'Ranger', 'Assassin', 'Knight'];
                optionsHTML = classes.map(c => `
                    <button onclick="selectSubType('${c}')" class="w-full py-4 px-6 bg-slate-800 hover:bg-slate-700 text-white font-medium rounded-xl border border-slate-700 active:scale-95 transition-all">
                        ⚔️ ${c}
                    </button>
                `).join('');
            } else {
                title = "Select Your Paradox Incubation";
                desc = "The architectural catalyst that shapes your cosmic sequence.";
                const premises = ['Alien Abduction', 'Escaped Lab Bio-Horror'];
                optionsHTML = premises.map(p => `
                    <button onclick="selectSubType('${p}')" class="w-full py-4 px-6 bg-slate-800 hover:bg-slate-700 text-white font-medium rounded-xl border border-slate-700 active:scale-95 transition-all">
                        🧬 ${p}
                    </button>
                `).join('');
            }

            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-center space-y-6">
                    <div class="text-center space-y-2">
                        <h2 class="text-xl font-bold text-white">${title}</h2>
                        <p class="text-slate-400 text-sm">${desc}</p>
                    </div>
                    <div class="flex flex-col space-y-3">
                        ${optionsHTML}
                    </div>
                </div>
            `;
        }

        function selectSubType(choice) {
            gameState.subType = choice;
            initCharacterCreation();
        }

        // Phase 2: Character Creation
        function initCharacterCreation() {
            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-center space-y-6">
                    <div class="text-center space-y-2">
                        <h2 class="text-xl font-bold text-white">Identity Matrix Definition</h2>
                        <p class="text-slate-400 text-sm">Input identity parameter strings below.</p>
                    </div>

                    <!-- Large, Touch-Friendly Input Field -->
                    <div class="space-y-2">
                        <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase">Avatar Designation Name</label>
                        <input id="char-name" type="text" placeholder="Enter name..." class="w-full px-4 py-4 bg-slate-950 border border-slate-700 rounded-xl text-white font-medium focus:outline-none focus:border-indigo-500 text-lg">
                    </div>

                    <!-- Gender Grid -->
                    <div class="space-y-2">
                        <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase">Gender Spectrum Alignment</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setGender(this, 'Male')" class="gender-btn py-3 bg-slate-800 hover:bg-slate-700 text-sm text-slate-300 rounded-xl border border-slate-700 font-medium transition-all">Male</button>
                            <button onclick="setGender(this, 'Female')" class="gender-btn py-3 bg-slate-800 hover:bg-slate-700 text-sm text-slate-300 rounded-xl border border-slate-700 font-medium transition-all">Female</button>
                            <button onclick="setGender(this, 'Non-Binary')" class="gender-btn py-3 bg-slate-800 hover:bg-slate-700 text-sm text-slate-300 rounded-xl border border-slate-700 font-medium transition-all">Non-Binary</button>
                        </div>
                    </div>

                    <!-- Action Trigger -->
                    <button onclick="submitCharacter()" class="w-full mt-4 py-4 bg-emerald-600 hover:bg-emerald-500 font-bold text-white rounded-xl active:scale-95 transition-all shadow-lg shadow-emerald-900/20">
                        Initialize Synchronicity Sequence ⚡
                    </button>
                </div>
            `;
        }

        function setGender(btnElement, genderVal) {
            document.querySelectorAll('.gender-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-500');
                btn.classList.add('bg-slate-800', 'text-slate-300', 'border-slate-700');
            });
            btnElement.classList.remove('bg-slate-800', 'text-slate-300', 'border-slate-700');
            btnElement.classList.add('bg-indigo-600', 'text-white', 'border-indigo-500');
            gameState.gender = genderVal;
        }

        function submitCharacter() {
            const inputName = document.getElementById('char-name').value.trim();
            if (!inputName) {
                alert('An entry parameter name is strictly required.');
                return;
            }
            if (!gameState.gender) {
                alert('Please establish a gender alignment spectrum.');
                return;
            }
            gameState.name = inputName;
            updateHUD();
            renderStoryLoop();
        }

        // Content Generator Matrix (Adhering to randomized components & strict chapter loops)
        const romancePartners = {
            'Fantasy': { name: 'Eldrin', role: 'the Rogue High Elf Mage' },
            'Sci-Fi': { name: 'Vex', role: 'the Cybernetic Sector Rebel Coordinator' }
        };

        const storyPool = {
            'Fantasy': {
                intro: "The terminal flashing patterns recede. You open your eyes to giant emerald canopies completely foreign to Earth. You are no longer in your room. Your core digital interface device registers a new localized data landscape.",
                mid: [
                    "A localized scouting squad registers spatial tracking markers moving on your vectors.",
                    "An ancient stone array hums aloud, matching your primary dynamic element path parameters.",
                    "Rumors spread across the regional merchant outposts regarding your unorthodox tactical frameworks.",
                    "A high-level creature configuration manifests out of a regional layout rift."
                ],
                outro: "The structural dimensional core of the high demon lord begins cracking under the structural load of your unified output arrays."
            },
            'Sci-Fi': {
                intro: "Neon alarms blare over localized structural relays. You sit up amidst dense atmospheric exhaust configurations. Whether caught in an active vessel or breaking free of standard biological status vats, you are unlinked.",
                mid: [
                    "A planetary security network launches scanning array sweeps looking to lock down your signal.",
                    "An isolated communications junction box reveals unencrypted data files detailing Earth structures.",
                    "Mercenary drop pods punch down through the ambient atmosphere canopy vectors.",
                    "A dangerous hyper-reactive entity mutation shatters its security housing module nearby."
                ],
                outro: "The primary engine matrix core begins its final overload sequence,threatening to vaporize the absolute sector coordinates."
            }
        };

        // Main Core Story Loop Router
        function renderStoryLoop() {
            updateHUD();
            const genre = gameState.genre;
            const partner = romancePartners[genre];
            
            let chapterText = "";
            let choices = [];

            // Compile Story Blocks programmatically mimicking long textual nodes
            if (gameState.currentChapter === 1) {
                chapterText = `${storyPool[genre].intro} As a fresh ${gameState.subType}, you balance these anomalous parameters. Suddenly, ${partner.name} ${partner.role} drops from an architectural node above, weapon drawn. "State your identification matrix parameters, dynamic traveler!"`;
                choices = [
                    { text: `🤝 Attempt friendly verification protocols`, romance: 1 },
                    { text: `🛡️ Assume immediate combat stance vectors`, romance: 0 }
                ];
            } else if (gameState.currentChapter === 20) {
                chapterText = `${storyPool[genre].outro} ${partner.name} stands battered nearby at the apex terminal junction line. This is the absolute limits of the runtime matrix. Every component choice has locked into place. One final command override string remains to establish permanent routing protocols.`;
                choices = [
                    { text: `🌌 Execute final system sync commands`, romance: 0 }
                ];
            } else {
                // Procedural generation components for chapters 2-19
                const baseText = storyPool[genre].mid[gameState.currentChapter % storyPool[genre].mid.length];
                
                if (gameState.currentChapter % 4 === 0) {
                    // Inject romance structural node
                    chapterText = `${baseText} During the local respite phase, ${partner.name} turns towards you, expression shifting through deep emotional profiles. "Ray... I've scanned your structural behavior routines. You do not compute like the baseline locals of this sector. Do you intend to permanently remain when this core sequence settles?"`;
                    choices = [
                        { text: `❤️ "I intend to bind my sector coordinates next to yours permanently."`, romance: 2 },
                        { text: `⚙️ "My primary priority target parameters remain fixing the home loop."`, romance: -1 }
                    ];
                } else {
                    // Regular tactical navigation node
                    chapterText = `${baseText} The structural terrain forces a split path resolution. Your local system tools analyze a high risk bypass corridor versus a slow structural engagement matrix down the primary valley grid.`;
                    choices = [
                        { text: `⚡ Deploy swift high-output high-risk bypass maneuvers`, romance: 0 },
                        { text: `🛡️ Establish calculated, defensive tactical attrition steps`, romance: 1 }
                    ];
                }
            }

            // Text Padding simulator to approximate comprehensive reading density guidelines
            const runtimeDescriptionText = `<p class="text-slate-300 leading-relaxed font-normal">${chapterText}</p>
            <p class="text-slate-500 text-xs italic mt-4 pt-4 border-t border-slate-800/50">
                [Systems Log: Data processing modules indicate deep narrative continuity loops active. High fidelity data parsing running smoothly inside local variable allocation matrices.]
            </p>`;

            // Inject structural layout buttons safely (No raw text entries allowed per UI specifications)
            const buttonsHTML = choices.map((choice, idx) => `
                <button onclick="handleChoice(${choice.romance})" class="w-full py-3.5 px-5 bg-slate-800 hover:bg-slate-700 active:bg-indigo-900 border border-slate-700 hover:border-indigo-500 text-left text-white font-medium rounded-xl transition-all flex items-center space-x-3 group">
                    <span class="flex-1">${choice.text}</span>
                    <span class="text-slate-500 group-hover:text-indigo-400 text-xs font-bold font-mono">▶</span>
                </button>
            `).join('');

            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-between h-full">
                    <!-- Text Area Container -->
                    <div class="flex-1 pr-1 overflow-y-auto space-y-4 mb-4">
                        ${runtimeDescriptionText}
                    </div>
                    <!-- Option Buttons Footer Matrix -->
                    <div class="space-y-2 shrink-0 pt-2 bg-slate-900">
                        ${buttonsHTML}
                    </div>
                </div>
            `;
        }

        function handleChoice(romanceMod) {
            gameState.romanceScore += romanceMod;
            
            if (gameState.currentChapter === 20) {
                renderEndGameScreen();
            } else {
                gameState.currentChapter++;
                renderStoryLoop();
            }
        }

        // Win Condition Parsing Engine (Chapter 20 + Hidden Variables check)
        function renderEndGameScreen() {
            hud.classList.add('hidden');
            let endTitle = "";
            let endBody = "";
            let bgClass = "";
            const partnerName = romancePartners[gameState.genre].name;

            // Romance score baseline check
            if (gameState.romanceScore >= 4) {
                bgClass = "border-emerald-500/30 bg-emerald-950/20";
                endTitle = "🏆 True Happy Ending Achieved";
                endBody = `The terminal array fully stabilizes. The dimensional anomaly constructs anchor cleanly into structural code patterns. You have successfully mapped your signature onto this world. By your side, ${partnerName} takes your hand as a unified horizon unfurls. Your bond metrics have broken the native variable floors, securing an absolute harmonious resolution. Matrix complete.`;
            } else {
                bgClass = "border-amber-500/30 bg-amber-950/20";
                endTitle = "⏳ Neutral Resolution Sequence";
                endBody = `The terminal engine successfully initializes its core execution cycle. The immediate threat profiles collapse, and you survive the timeline resolution sequence. However, your emotional affinity logs with ${partnerName} lacked the required cryptographic depth to transcend the standard tracking parameters. You remain isolated inside the new system layer, looking back on what paths went unselected.`;
            }

            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-center space-y-6">
                    <div class="p-6 border rounded-2xl ${bgClass} space-y-4">
                        <h2 class="text-xl font-bold text-center text-white">${endTitle}</h2>
                        <p class="text-slate-300 text-sm leading-relaxed text-center">${endBody}</p>
                    </div>
                    <div class="space-y-2 text-center text-xs text-slate-500">
                        <p>Final Profile Log: ${gameState.name} | ${gameState.genre} (${gameState.subType})</p>
                        <p>Affinity Metric Register: Score [${gameState.romanceScore}]</p>
                    </div>
                    <button onclick="resetGame()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 font-bold text-white rounded-xl active:scale-95 transition-all">
                        Re-initialize Core Gateway Loop 🔁
                    </button>
                </div>
            `;
        }

        function resetGame() {
            gameState = {
                genre: '',
                subType: '',
                name: '',
                gender: '',
                currentChapter: 1,
                romanceScore: 0
            };
            initGenreScreen();
        }

        // Initialize Application Context Frame
        initGenreScreen();
    </script>
</body>
</html>
