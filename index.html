<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isekai Realms: D&D Chronicles</title>
    <!-- Tailwind CSS for mobile portrait layout -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 flex justify-center items-center min-h-screen p-4 select-none">

    <!-- Mobile Screen Frame Container -->
    <div class="w-full max-w-md bg-slate-900 border-2 border-slate-800 rounded-2xl shadow-2xl flex flex-col h-[90vh] overflow-hidden">
        
        <!-- Game Header / HUD -->
        <header class="bg-slate-950 px-6 py-4 border-b border-slate-800 flex justify-between items-center shrink-0">
            <h1 class="text-sm font-bold tracking-widest text-indigo-400 uppercase">Isekai Gateway</h1>
            <div id="hud-stats" class="text-xs text-slate-400 hidden">
                <span id="hud-name" class="font-semibold text-slate-200"></span> | 
                <span id="hud-chapter" class="text-amber-400 font-semibold">Ch 1/100</span>
            </div>
        </header>

        <!-- Dynamic Game Content Viewport -->
        <main id="game-viewport" class="flex-1 overflow-y-auto p-6 flex flex-col justify-between space-y-6">
            <!-- Content Injected Dynamically -->
        </main>
        
    </div>

    <script>
        // Pure Fantasy State Architecture
        let gameState = {
            subType: '',       // 'Summoner' | 'Ranger' | 'Assassin' | 'Knight'
            name: '',
            gender: '',        // 'Male' | 'Female' | 'Non-Binary'
            currentChapter: 1, 
            romanceScore: 0,   // Finely balanced affinity counter
        };

        const view = document.getElementById('game-viewport');
        const hud = document.getElementById('hud-stats');

        function updateHUD() {
            if (gameState.name) {
                hud.classList.remove('hidden');
                document.getElementById('hud-name').innerText = `${gameState.name} (${gameState.subType})`;
                document.getElementById('hud-chapter').innerText = `Ch ${gameState.currentChapter}/100`;
            } else {
                hud.classList.add('hidden');
            }
        }

        // Phase 1: Class Selection Screen
        function initClassScreen() {
            updateHUD();
            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-center space-y-6">
                    <div class="text-center space-y-2">
                        <h2 class="text-2xl font-bold text-white">Select Your Class</h2>
                        <p class="text-slate-400 text-sm">Your physical awakening ruleset inside the magical plane.</p>
                    </div>
                    <div class="flex flex-col space-y-3">
                        <button onclick="selectClass('Summoner')" class="w-full py-4 px-6 bg-indigo-950 hover:bg-indigo-900 text-left font-semibold text-white rounded-xl transition-all border border-indigo-500/30 active:scale-95 flex justify-between items-center">
                            <span>🔮 Summoner</span> <span class="text-xs text-indigo-400">Ethereal Pets</span>
                        </button>
                        <button onclick="selectClass('Ranger')" class="w-full py-4 px-6 bg-emerald-950 hover:bg-emerald-900 text-left font-semibold text-white rounded-xl transition-all border border-emerald-500/30 active:scale-95 flex justify-between items-center">
                            <span>🏹 Ranger</span> <span class="text-xs text-emerald-400">Precision Strikes</span>
                        </button>
                        <button onclick="selectClass('Assassin')" class="w-full py-4 px-6 bg-rose-950 hover:bg-rose-900 text-left font-semibold text-white rounded-xl transition-all border border-rose-500/30 active:scale-95 flex justify-between items-center">
                            <span>🗡️ Assassin</span> <span class="text-xs text-rose-400">Shadow Stepping</span>
                        </button>
                        <button onclick="selectClass('Knight')" class="w-full py-4 px-6 bg-slate-800 hover:bg-slate-700 text-left font-semibold text-white rounded-xl transition-all border border-slate-600 active:scale-95 flex justify-between items-center">
                            <span>🛡️ Knight</span> <span class="text-xs text-slate-400">Heavy Bulwark</span>
                        </button>
                    </div>
                </div>
            `;
        }

        function selectClass(choice) {
            gameState.subType = choice;
            initCharacterCreation();
        }

        // Phase 2: Character Creation
        function initCharacterCreation() {
            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-center space-y-6">
                    <div class="text-center space-y-2">
                        <h2 class="text-xl font-bold text-white">Identity Awakening</h2>
                        <p class="text-slate-400 text-sm">Etch your name into the world's ancient tapestry.</p>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase">True Name</label>
                        <input id="char-name" type="text" placeholder="Enter name..." class="w-full px-4 py-4 bg-slate-950 border border-slate-700 rounded-xl text-white font-medium focus:outline-none focus:border-indigo-500 text-lg">
                    </div>

                    <div class="space-y-2">
                        <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase">Gender Alignment</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setGender(this, 'Male')" class="gender-btn py-3 bg-slate-800 hover:bg-slate-700 text-sm text-slate-300 rounded-xl border border-slate-700 font-medium transition-all">Male</button>
                            <button onclick="setGender(this, 'Female')" class="gender-btn py-3 bg-slate-800 hover:bg-slate-700 text-sm text-slate-300 rounded-xl border border-slate-700 font-medium transition-all">Female</button>
                            <button onclick="setGender(this, 'Non-Binary')" class="gender-btn py-3 bg-slate-800 hover:bg-slate-700 text-sm text-slate-300 rounded-xl border border-slate-700 font-medium transition-all">Non-Binary</button>
                        </div>
                    </div>

                    <button onclick="submitCharacter()" class="w-full mt-4 py-4 bg-indigo-600 hover:bg-indigo-500 font-bold text-white rounded-xl active:scale-95 transition-all shadow-lg shadow-indigo-900/20">
                        Cross the Threshold ⚡
                    </button>
                </div>
            `;
        }

        function setGender(btnElement, genderVal) {
            document.querySelectorAll('.gender-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-500');
                btn.classList.add('bg-slate-800', 'text-slate-300', 'border-slate-700');
            });
            btnElement.classList.remove('bg-slate-800', 'text-slate-300', 'border-slate-700');
            btnElement.classList.add('bg-indigo-600', 'text-white', 'border-indigo-500');
            gameState.gender = genderVal;
        }

        function submitCharacter() {
            const inputName = document.getElementById('char-name').value.trim();
            if (!inputName) {
                alert('A name is strictly required.');
                return;
            }
            if (!gameState.gender) {
                alert('Please select your gender profile.');
                return;
            }
            gameState.name = inputName;
            updateHUD();
            renderStoryLoop();
        }

        // Dynamic Romance Engine
        function getRomancePartner() {
            const gender = gameState.gender;
            if (gender === 'Male') return { name: 'Lyra', role: 'the Fierce Elven Ranger' };
            if (gender === 'Female') return { name: 'Garrick', role: 'the Charming Vanguard Knight' };
            return { name: 'Eldrin', role: 'the Rogue High Elf Mage' }; 
        }

        // Scenario Database Matrices
        const explorationScenarios = [
            {
                text: "The path ahead is completely blocked by a massive, reinforced ironwood security door blocking access to the inner temple ruins.",
                type: "Door",
                perkClass: "Assassin",
                options: [
                    { text: "💥 [Strength (Athletics)] Try to violently kick down the heavy frame", romance: 0 },
                    { text: "✊ [Charisma (Persuasion)] Knock loudly, demanding access from anyone inside", romance: -1 },
                    { text: "🌿 [Intelligence (Investigation)] Search the moss nearby for a hidden bypass lever", romance: 1 },
                    { text: "🔑 [Class: Assassin] Pull out specialized thieves' tools and manually pick the complex lock mechanism", romance: 2 }
                ]
            },
            {
                text: "A large, agitated Dire Boar blocks the narrow mountain valley crossing, defensive tusks bared and stamping its hooves.",
                type: "Beast",
                perkClass: "Ranger",
                options: [
                    { text: "🍎 [Sleight of Hand] Drop rations from your pack gently onto the grass to distract it", romance: 1 },
                    { text: "🗣️ [Charisma (Intimidation)] Yell loudly and wave your arms to forcefully scare it off", romance: -1 },
                    { text: "⚔️ [Dexterity (Acrobatics)] Try to swiftly dodge around its flanks over the rocks", romance: 0 },
                    { text: "🐾 [Class: Ranger] Utilize Natural Kinship behavior arrays to convey total peaceful intent", romance: 2 }
                ]
            },
            {
                text: "An unstable arcane font sits raw and cracked in the center of the pathway, overflowing with volatile magical elements.",
                type: "Arcane",
                perkClass: "Summoner",
                options: [
                    { text: "📜 [Intelligence (Arcana)] Attempt a baseline structural dispel pattern to neutralize it", romance: 1 },
                    { text: "🏃 [Dexterity (Stealth)] Try to quietly crawl past the perimeter edge undetected", romance: 0 },
                    { text: "🪨 [Strength (Athletics)] Throw heavy boulders from afar to forcefully ground the source", romance: -1 },
                    { text: "🔮 [Class: Summoner] Order your ethereal familiar to cleanly absorb and filter the raw elements", romance: 2 }
                ]
            },
            {
                text: "An Elite Guard Commander bars the outpost exit corridor, demanding to check passports and travel authorizations.",
                type: "Guard",
                perkClass: "Knight",
                options: [
                    { text: "🪙 [Charisma (Deception)] Attempt to slip a bribe or fabricate an emergency authorization rule", romance: -1 },
                    { text: "👑 [Charisma (Persuasion)] Reason calmly regarding the global threat requiring passage", romance: 1 },
                    { text: "👟 [Dexterity (Stealth)] Wait for the torch rotation pattern to slip past in the shadows", romance: 0 },
                    { text: "🛡️ [Class: Knight] Flash your authorized Bulwark Guild Emblem, pulling absolute high rank status", romance: 2 }
                ]
            }
        ];

        const combatAtmospheres = [
            "A hostile pack of skeletal vanguard warriors surges outward from the crypt crypt walls.",
            "A territorial wyvern cuts down through the high canopy vectors, tracking your position.",
            "Ambushers from the dark wizard factions fire coordinated arcane missiles into your line.",
            "A massive stone golem stands up out of the valley floor, eyes glowing bright crimson."
        ];

        // Core Dynamic 100-Chapter Engine Layout
        function renderStoryLoop() {
            updateHUD();
            const partner = getRomancePartner();
            const current = gameState.currentChapter;
            let chapterText = "";
            let choices = [];

            if (current === 1) {
                chapterText = `You gasp for air, collapsing onto a bed of damp earth and pine needles. The blinding light of an intricate summoning circle fades on the ground beneath you. Your head throbs, and your clothes are completely out of place here. Reaching into your pocket, you pull out your Earth cell phone—there is zero service, but its offline screen flickers to life, strangely vibrating in sync with the ambient energy. As you stand up trying to process your new body's **${gameState.subType}** abilities, a branch snaps. ${partner.name}, ${partner.role}, drops from the canopy above with a weapon drawn. "State your name and business, traveler! I saw the summoning rift from the valley!"`;
                choices = [
                    { text: "🤝 [Charisma (Persuasion)] Lower your hands and offer a peaceful explanation", romance: 1 },
                    { text: "🛡️ [Strength (Athletics)] Brace your posture and prepare for an immediate duel", romance: 0 },
                    { text: "🪙 [Charisma (Deception)] Claim you're a high-ranking traveling merchant who got lost", romance: -1 }
                ];
            } else if (current === 100) {
                chapterText = `The ancient obsidian throne room shakes violently. The High Demon Lord's magical core cracks open under the sheer weight of your maximum tier choices. ${partner.name} stands bloodied but defiant by your side at the edge of the altar. Your cell phone, humming with absolute runic feedback in your pocket, flashes a final system alert. This is the absolute climax of your journey. One final strike will seal the dark rift forever.`;
                choices = [
                    { text: "🌌 [Class Ultimate] Channel your absolute class convergence spell matrix!", romance: 0 }
                ];
            } else if (current % 10 === 0) {
                // Romance Milestones
                chapterText = `The crackle of the campfire casts long shadows against the ancient stone archway. While resting for the night, you check your cell phone—the battery is holding steady, acting as a small comfort from home. ${partner.name} walks over and sits closely beside you on a log, watching the sparks rise into the dark sky. "${gameState.name}... I've watched you fight. You possess a strange wisdom, and you look at that glowing mirror tool like a lost treasure. When this war is finally won... do you think you'll try to find a way back to your world, or stay?"`;
                choices = [
                    { text: "❤️ [Affinity +] \"My world is wherever you are now. I'm staying.\"", romance: 2 },
                    { text: "⚖️ [Affinity Neutral] \"We need to focus on surviving tomorrow before planning futures.\"", romance: 0 },
                    { text: "✨ [Affinity -] \"I must discover a portal back to my original home, no matter what.\"", romance: -1 }
                ];
            } else if (current % 2 === 0) {
                // Exploration Matrix Chapters (Features D&D Skill Blocks + Hidden Class Perks)
                const scenario = explorationScenarios[current % explorationScenarios.length];
                chapterText = `[Exploration Phase] Moving through the regional coordinates, you encounter a clear obstacle. ${scenario.text} ${partner.name} prepares to assist, awaiting your dynamic command vector.`;
                
                // Collect standard 3 options
                choices = [scenario.options[0], scenario.options[1], scenario.options[2]];
                
                // Add the 4th choice ONLY if the user's active class matches the scenario perk criteria
                if (gameState.subType === scenario.perkClass) {
                    choices.push(scenario.options[3]);
                }
            } else {
                // Combat Matrix Chapters (Features balanced D&D tactics)
                const combatText = combatAtmospheres[current % combatAtmospheres.length];
                chapterText = `[Combat Phase] Tactical engagement running! ${combatText} ${partner.name} jumps into defensive alignment beside you, blades or spells readied!`;
                choices = [
                    { text: "⚔️ [Dexterity (Acrobatics)] Execute a swift offensive flanking maneuver", romance: 1 },
                    { text: "🛡️ [Strength (Athletics)] Hold the line firmly to tank the incoming damage aggro", romance: 0 },
                    { text: "🏃 [Wisdom (Survival)] Fall back slightly to cover to look for structural weaknesses", romance: 1 },
                    { text: "😡 [Charisma (Intimidation)] Charge forward recklessly, screaming a loud challenge", romance: -1 }
                ];
            }

            // Interactive HUD Area Layout
            const runtimeDescriptionText = `
                <p class="text-slate-300 leading-relaxed font-normal">${chapterText}</p>
                <div class="mt-4 pt-4 border-t border-slate-800/50 flex justify-between text-[11px] text-slate-500 font-mono">
                    <span>📱 PHONE BATTERY: ${(100 - (current * 0.4)).toFixed(0)}%</span>
                    <span>💘 AFFINITY SCORE: ${gameState.romanceScore}</span>
                </div>
            `;

            // Dynamic Render Option Buttons
            const buttonsHTML = choices.map(choice => `
                <button onclick="handleChoice(${choice.romance})" class="w-full py-3 px-4 bg-slate-800 hover:bg-slate-700 active:bg-indigo-900 border border-slate-700 hover:border-indigo-500 text-left text-white font-medium rounded-xl transition-all flex items-center space-x-3 group">
                    <span class="flex-1 text-xs md:text-sm leading-snug">${choice.text}</span>
                    <span class="text-slate-500 group-hover:text-indigo-400 text-xs font-bold font-mono shrink-0">▶</span>
                </button>
            `).join('');

            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-between h-full">
                    <div class="flex-1 pr-1 overflow-y-auto space-y-4 mb-4">
                        ${runtimeDescriptionText}
                    </div>
                    <div class="space-y-2 shrink-0 pt-2 bg-slate-900">
                        ${buttonsHTML}
                    </div>
                </div>
            `;
        }

        function handleChoice(romanceMod) {
            gameState.romanceScore += romanceMod;
            
            if (gameState.currentChapter === 100) {
                renderEndGameScreen();
            } else {
                gameState.currentChapter++;
                renderStoryLoop();
            }
        }

        // Calibrated 4-Tier Ending Engine Matrix
        function renderEndGameScreen() {
            hud.classList.add('hidden');
            let endTitle = "";
            let endBody = "";
            let bgClass = "";
            const partner = getRomancePartner();
            const finalScore = gameState.romanceScore;

            if (finalScore >= 30) {
                bgClass = "border-emerald-500/30 bg-emerald-950/20";
                endTitle = "🏆 True Romance Ending: Bond Eternal";
                endBody = `The dark rifts are permanently sealed, and peace settles across the kingdoms. Your phone screen goes black as its battery drains completely—but it doesn't matter. By your side, ${partner.name} takes your hand as a bright new kingdom unfurls. Your unwavering trust and emotional synergy broke the system constraints, securing an absolute harmonious lifetime together. Campaign Complete!`;
            } else if (finalScore >= 10 && finalScore < 30) {
                bgClass = "border-cyan-500/30 bg-cyan-950/20";
                endTitle = "⚔️ Vanguard Ending: Solo Legend";
                endBody = `The dark forces collapse, and the realm is saved through pure tactical efficiency. You choose to stay in this world as a legendary protector. However, your emotional connection with ${partner.name} remained professional and balanced rather than romantic. You remain steadfast allies, walking the battlements as companions in arms, but separate at night.`;
            } else if (finalScore >= 0 && finalScore < 10) {
                bgClass = "border-amber-500/30 bg-amber-950/20";
                endTitle = "⏳ Lonely Ending: A World Apart";
                endBody = `The world is saved at the 100-chapter mark. However, your repeated prioritization of home over the local populace created an unspoken distance. A shimmering residual rift opens before you. Without a word, ${partner.name} turns away into the trees. You step back through the rift alone, returning to your quiet Earth room with only a dead cell phone left to prove it happened.`;
            } else {
                bgClass = "border-rose-500/30 bg-rose-950/20";
                endTitle = "💀 Bad Ending: Broken Lineage";
                endBody = `Your reckless and antagonistic behavior patterns completely fractured your tactical party coordination metrics. Under the crushing pressure of the final battle, the rift overloads. ${partner.name} falls in battle trying to cover your retreat, and the dark anomaly swallows the entire regional sector grid. Total timeline failure.`;
            }

            view.innerHTML = `
                <div class="flex-1 flex flex-col justify-center space-y-6">
                    <div class="p-6 border rounded-2xl ${bgClass} space-y-4">
                        <h2 class="text-xl font-bold text-center text-white">${endTitle}</h2>
                        <p class="text-slate-300 text-sm leading-relaxed text-center">${endBody}</p>
                    </div>
                    <div class="space-y-2 text-center text-xs text-slate-500 font-mono">
                        <p>Final Log: ${gameState.name} | ${gameState.subType}</p>
                        <p>Final Affinity Score: [${finalScore}]</p>
                    </div>
                    <button onclick="resetGame()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 font-bold text-white rounded-xl active:scale-95 transition-all">
                        Re-initialize Gateway Loop 🔁
                    </button>
                </div>
            `;
        }

        function resetGame() {
            gameState = {
                subType: '',
                name: '',
                gender: '',
                currentChapter: 1,
                romanceScore: 0
            };
            initClassScreen();
        }

        // Initialize Context
        initClassScreen();
    </script>
</body>
</html>
